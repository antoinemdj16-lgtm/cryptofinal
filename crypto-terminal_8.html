    else if(t==='bullish')txt+=`Le marché ${sym} affiche une tendance haussière. `;
    else txt+=`Le marché ${sym} est en phase de transition sans direction claire. `;
    if(rsi&&rsi<30)txt+=`Le RSI est en zone de survente extrême (${FMT.num(rsi,1)}), ce qui signifie que les vendeurs s'épuisent.`;
    else if(rsi&&rsi<40)txt+=`Le RSI indique une pression vendeuse forte (${FMT.num(rsi,1)}).`;
    else if(rsi&&rsi>70)txt+=`Le RSI est en zone de surachat (${FMT.num(rsi,1)}), attention à un essoufflement.`;
    else if(rsi)txt+=`Le RSI est neutre (${FMT.num(rsi,1)}).`;
    return txt;
  },
  why(analysis,chg24,chg7,price){
    const{regime,macd,ema50,ema200}=analysis;
    const up=chg24>=0;
    let txt='';
    if(up){
      if(macd&&macd.crossUp)txt='Le MACD vient de croiser à la hausse — un signal technique positif. ';
      else if(regime.trend==='bullish')txt='La structure haussière attire des acheteurs supplémentaires. ';
      else txt='Rebond technique après une zone de survente. ';
      if(ema50&&price&&price>ema50*0.98)txt+='La moyenne mobile 50j soutient le mouvement. ';
    }else{
      if(macd&&macd.crossDown)txt='Le MACD vient de croiser à la baisse — signal de vente activé. ';
      else if(regime.trend==='bearish')txt='La pression vendeuse continue — la structure est baissière. ';
      else txt='Correction dans un contexte de marché incertain. ';
      txt+='Les sorties de capitaux ETF et un contexte macro hawkish (Fed) pèsent sur l\'ensemble du marché crypto.';
    }
    if(Math.abs(chg7||0)>15)txt+=(chg7<0?' La baisse sur 7 jours est significative.'  :' La hausse sur 7 jours est notable.');
    return txt;
  },
  timing(analysis){
    const{score,regime,rsi}=analysis;
    if(score>=72&&regime.trend!=='bearish')return'Les indicateurs sont favorables. Les supports tiennent, le momentum revient. Un bon moment pour entrer, idéalement en plusieurs fois.';
    if(score>=55)return'Il n\'est pas impossible d\'entrer progressivement, mais le marché reste incertain. Une stratégie DCA (achats fractionnés) réduit le risque de se positionner au mauvais moment.';
    if(rsi&&rsi<28)return'La survente extrême peut offrir un rebond technique. Ce n\'est pas une thèse d\'investissement, mais un point d\'entrée tactique possible avec un stop-loss strict.';
    if(regime.trend==='bearish')return'La tendance est baissière. Il n\'est pas encore prudent d\'investir. Attendre une confirmation de retournement (clôture hebdomadaire au-dessus d\'une résistance clé).';
    return'Le marché manque de direction. Mieux vaut attendre un signal clair avant de s\'engager.';
  },
  actionClass(action){
    if(action==='buy')return'action-buy';
    if(action==='dca')return'action-dca';
    if(action==='avoid')return'action-avoid';
    return'action-wait';
  },
  // RÈGLE D'HONNÊTETÉ : jamais d'impératif ("acheter maintenant"), jamais de
  // certitude. Toujours une formulation conditionnelle, quel que soit le code
  // interne (buy/dca/wait/avoid).
  actionLabel(action){
    if(action==='buy')return'Conditions favorables';
    if(action==='dca')return'Accumulation prudente possible';
    if(action==='avoid')return'Contexte prudent';
    return'Confirmation nécessaire';
  },
  riskLabel(risk){
    if(risk==='low')return'🟢 Faible';if(risk==='high')return'🔴 Élevé';return'🟡 Moyen';
  },
  horizons(action){
    if(action==='buy')return{ct:'Bon',mt:'Favorable',lt:'Favorable'};
    if(action==='dca')return{ct:'Neutre',mt:'Acceptable',lt:'Favorable'};
    if(action==='avoid')return{ct:'Risqué',mt:'Risqué',lt:'Incertain'};
    return{ct:'Neutre',mt:'Neutre',lt:'Incertain'};
  },
  scoreInterp(s){
    if(s<=30)return{txt:'Éviter',cls:'neg',emoji:'🔴'};if(s<=50)return{txt:'Faible conviction',cls:'neg',emoji:'🔴'};
    if(s<=70)return{txt:'Acceptable',cls:'neu',emoji:'🟡'};if(s<=85)return{txt:'Intéressant',cls:'pos',emoji:'🟢'};
    return{txt:'Très favorable',cls:'pos',emoji:'🟢'};
  },
  // Traductions en français simple des sections techniques — une phrase par
  // section, posée juste au-dessus des données brutes (RSI, MACD, niveaux…)
  // pour qu'un débutant comprenne le sens sans connaître le vocabulaire.
  regimeExplain(regime,sym){
    const c=regime.conf;
    const confTxt=c>=70?'avec un bon niveau de confiance':c>=50?'avec une confiance modérée':'mais le signal reste incertain';
    if(regime.trend==='bullish')return`${sym} suit une tendance haussière depuis plusieurs jours, ${confTxt}.`;
    if(regime.trend==='bearish')return`${sym} suit une tendance baissière depuis plusieurs jours, ${confTxt}.`;
    return`${sym} évolue sans tendance claire pour le moment, ${confTxt}.`;
  },
  indicatorsExplain(a){
    let bull=0,bear=0;
    if(a.rsi!=null){a.rsi>50?bull++:bear++}
    if(a.macd){a.macd.bullish?bull++:bear++}
    if(a.structure==='bullish')bull++;else if(a.structure==='bearish')bear++;
    if(bull>bear)return'Les indicateurs techniques sont majoritairement alignés à la hausse.';
    if(bear>bull)return'Les indicateurs techniques sont majoritairement alignés à la baisse.';
    return'Les indicateurs techniques sont partagés — aucune direction claire ne se dégage.';
  },
  levelsExplain(a,price){
    const sup=a.supports&&a.supports[0],res=a.resistances&&a.resistances[0];
    if(!sup&&!res)return'Aucun niveau clé identifiable sur la période observée.';
    if(sup&&res){
      return Math.abs(price-sup)<Math.abs(res-price)
        ?`Le prix est actuellement plus proche du support (${FMT.price(sup)}) que de la résistance (${FMT.price(res)}).`
        :`Le prix est actuellement plus proche de la résistance (${FMT.price(res)}) que du support (${FMT.price(sup)}).`;
    }
    return sup?`Seul un support a été identifié, à ${FMT.price(sup)}.`:`Seule une résistance a été identifiée, à ${FMT.price(res)}.`;
  },
  scenariosExplain(scenarios){
    const list=[{label:'baissier',v:scenarios.bear},{label:'neutre',v:scenarios.neu},{label:'haussier',v:scenarios.bull}].sort((a,b)=>b.v-a.v);
    return`Selon le modèle, le scénario le plus probable aujourd'hui est ${list[0].label} (${list[0].v}%), suivi du scénario ${list[1].label} (${list[1].v}%).`;
  },
  execOneLiner(state){
    const scores=C.coins.map(c=>({sym:c.sym,score:state[c.id]?.analysis?.score||0}));
    const best=scores.reduce((a,b)=>a.score>b.score?a:b);
    const worst=scores.reduce((a,b)=>a.score<b.score?a:b);
    const btcA=state.bitcoin?.analysis;
    if(!btcA)return'Données insuffisantes pour une conclusion.';
    const t=btcA.regime.trend;
    if(t==='bearish')return`Le marché est en tendance baissière — ${best.sym} est l\'actif le plus résistant mais la patience est la meilleure stratégie aujourd\'hui.`;
    if(t==='bullish')return`Le marché est haussier — ${best.sym} offre le meilleur setup technique pour entrer ou renforcer progressivement.`;
    return`Le marché est en transition — conserver ses positions existantes, éviter les nouvelles entrées impulsives, surveiller ${best.sym} qui montre la meilleure attractivité (${best.score}/100).`;
  },
  // Synthèse cross-actifs en une phrase (Overview). Réutilise scoreInterp.cls
  // (pos/neu/neg) — aucun nouveau seuil, pour rester cohérent avec le score
  // déjà affiché sur chaque carte.
  dailyVerdict(state){
    const items=C.coins.map(c=>{
      const d=state[c.id];if(!d||!d.analysis)return null;
      return{sym:c.sym,cls:this.scoreInterp(d.analysis.score).cls};
    }).filter(Boolean);
    if(!items.length)return'Données insuffisantes pour une synthèse aujourd\'hui.';
    const strong=items.filter(i=>i.cls==='pos');
    const weak=items.filter(i=>i.cls==='neg');
    const neutral=items.filter(i=>i.cls==='neu');
    if(!strong.length&&!weak.length)return`Aucun signal fort aujourd'hui — les ${items.length} actifs suivis sont dans une zone neutre.`;
    const parts=[];
    if(strong.length)parts.push(`${strong.length} opportunité${strong.length>1?'s':''} forte${strong.length>1?'s':''} (${strong.map(i=>i.sym).join(', ')})`);
    if(neutral.length)parts.push(`${neutral.length} neutre${neutral.length>1?'s':''}`);
    if(weak.length)parts.push(`${weak.length} à éviter (${weak.map(i=>i.sym).join(', ')})`);
    return`Aujourd'hui : ${parts.join(', ')}.`;
  }
};

// ═══════════════════════════════════════════════════
//  COPILOT — Moteur de synthèse du copilote
//  Calcule, à partir des analyses déjà produites par SIGNALS (aucune donnée
//  supplémentaire, aucun appel réseau de plus) :
//    • le score de CONFIANCE (obligatoire)
//    • le moteur CONTRADICTOIRE (positif / négatif / conclusion)
//    • le moteur d'INVALIDATION ("qu'est-ce qui ferait changer d'avis ?")
//    • le moteur de CHANGEMENT (vs dernière mise à jour enregistrée)
//    • le moteur d'INACTION (capacité de dire "ne rien faire")
//    • la synthèse globale BTC/ETH/SOL/XRP (régime / qualité du capital /
//      accélération / rotation) avec pondération dynamique par rôle.
//  Règle d'honnêteté : tout texte généré ici passe par un vocabulaire
//  conditionnel (jamais d'impératif, jamais de certitude absolue).
// ═══════════════════════════════════════════════════
const COPILOT = {

  // ── Niveau de confiance générique (0-39 🔴 / 40-69 🟡 / 70-100 🟢) ──
  levelOf(score){
    const level=score<40?'low':score<70?'medium':'high';
    return{level,
      label:level==='low'?'Faible':level==='medium'?'Moyenne':'Élevée',
      emoji:level==='low'?'🔴':level==='medium'?'🟡':'🟢'};
  },

  // ── INDICE DE DÉCISION (Phase 3) : couche de synthèse pure. Ne recalcule
  // rien — combine deux briques déjà produites ailleurs (opportunité =
  // SIGNALS.score / COPILOT.globalOpportunity ; confiance =
  // COPILOT.assetConfidence / globalConfidence). Produit, pas moyenne : les
  // deux doivent être hauts pour que l'indice monte, un seul facteur fort ne
  // compense jamais l'autre. « fragile » signale un score élevé porté par
  // une confiance faible — exactement le cas que l'indice ne doit pas
  // présenter comme fiable. Bandes et seuils repris tels quels du brief.
  decisionIndex(opportunity,confidenceScore){
    if(opportunity==null||confidenceScore==null)
      return{score:null,band:'inconnu',txt:'Inconnu',cls:'neu',emoji:'⚪',fragile:false};
    const score=Math.round((opportunity/100)*(confidenceScore/100)*100);
    const fragile=opportunity>50&&confidenceScore<40;
    let band,txt,cls,emoji;
    if(score<=30){band='ignorer';txt='Ignorer';cls='neg';emoji='🔴'}
    else if(score<=50){band='attendre';txt='Attendre';cls='neg';emoji='🟠'}
    else if(score<=70){band='surveiller';txt='Surveiller';cls='neu';emoji='🟡'}
    else if(score<=85){band='favorable';txt='Favorable';cls='pos';emoji='🟢'}
    else{band='tres-favorable';txt='Très favorable';cls='pos';emoji='🟢'}
    return{score,band,txt,cls,emoji,fragile};
  },

  rsiBucket(rsi){if(rsi==null)return null;if(rsi<30)return'survente';if(rsi>70)return'surachat';return'neutre'},

  // Cohérence multi-timeframe : les fenêtres 7j / 30j / 90j racontent-elles la
  // même histoire de direction ? (heuristique simple : signe de la variation
  // sur chaque fenêtre, déjà disponible dans a.prices)
  mtfCoherence(a){
    const dir=arr=>{if(!arr||arr.length<2)return 0;const d=arr[arr.length-1]-arr[0];return d>0?1:d<0?-1:0};
    const dirs=[dir(a.prices.p7),dir(a.prices.p30),dir(a.prices.p90)].filter(x=>x!==0);
    if(!dirs.length)return 50;
    const pos=dirs.filter(x=>x>0).length,neg=dirs.filter(x=>x<0).length;
    return Math.round(Math.max(pos,neg)/3*100);
  },

  // Contradictions détectées entre indicateurs (alimente la confiance ET le
  // moteur contradictoire). Liste volontairement courte et explicite.
  contradictions(a,price){
    const f=[];
    if(a.rsi!=null&&a.macd){
      const rsiBull=a.rsi>=50,macdBull=a.macd.bullish;
      if(rsiBull!==macdBull)f.push('RSI et MACD ne sont pas alignés');
    }
    if(a.structure==='bullish'&&a.ema50&&price<a.ema50)f.push('Structure haussière mais prix sous l\'EMA50');
    if(a.structure==='bearish'&&a.ema50&&price>a.ema50)f.push('Structure baissière mais prix au-dessus de l\'EMA50');
    if(a.ema50&&a.ema200){
      const a50=price>a.ema50,a200=price>a.ema200;
      if(a50!==a200)f.push('Moyennes mobiles 50/200 jours non alignées');
    }
    if(a.volTrend&&a.prices.p30&&a.prices.p30.length>1){
      const p30=a.prices.p30,chg=(p30[p30.length-1]-p30[0])/p30[0]*100;
      if(chg>3&&a.volTrend.falling)f.push('Hausse de prix non confirmée par le volume');
      if(chg<-3&&a.volTrend.rising)f.push('Baisse de prix accompagnée d\'un volume croissant');
    }
    if(a.macd&&a.macd.crossUp&&a.rsi&&a.rsi>72)f.push('Signal haussier récent mais RSI déjà suracheté');
    if(a.macd&&a.macd.crossDown&&a.rsi&&a.rsi<28)f.push('Signal baissier récent mais RSI déjà survendu');
    return f;
  },

  // ── SCORE DE CONFIANCE (obligatoire) ──
  // Dépend de : accord entre indicateurs, fraîcheur des données, cohérence
  // multi-timeframe, contradictions détectées. Confiance ≠ Opportunité.
  assetConfidence(a,price,freshness,flags){
    const total=a.regime.bull+a.regime.bear;
    const ratio=total>0?Math.max(a.regime.bull,a.regime.bear)/total:0.5;
    const agreement=Math.round(Math.max(0,(ratio-0.5)/0.5)*100);
    const multiTF=this.mtfCoherence(a);
    const contraScore=Math.max(0,100-flags.length*16);
    const raw=agreement*0.30+multiTF*0.25+freshness*0.20+contraScore*0.25;
    const score=Math.min(100,Math.max(0,Math.round(raw)));
    return{score,...this.levelOf(score),factors:{agreement,freshness,multiTF,contradictions:contraScore,flagsCount:flags.length}};
  },

  // Fraîcheur des données (0-100), fonction pure : âge depuis le dernier
  // succès de synchronisation + source (le repli CoinPaprika réutilise un
  // historique technique potentiellement daté → plafond de fraîcheur).
  freshness(asOfTs,source){
    const age=asOfTs?Date.now()-asOfTs:Infinity;
    let base;
    if(age<C.REFRESH_MS)base=100;
    else if(age<C.REFRESH_MS*2)base=75;
    else if(age<C.REFRESH_MS*4)base=50;
    else if(age<C.REFRESH_MS*12)base=35;
    else base=20;
    if(source==='coinpaprika')base=Math.min(base,60);
    return base;
  },

  // ── MOTEUR CONTRADICTOIRE (obligatoire) : POSITIF / NÉGATIF / CONCLUSION ──
  proCon(a,d,confScore){
    const pos=[],neg=[];
    if(a.rsi!=null){
      if(a.rsi<35)pos.push(`RSI bas (${a.rsi.toFixed(0)}) — zone de survente, rebond technique possible`);
      else if(a.rsi>65)neg.push(`RSI élevé (${a.rsi.toFixed(0)}) — risque de surachat`);
    }
    if(a.macd){
      if(a.macd.crossUp)pos.push('Croisement MACD haussier récent');
      else if(a.macd.crossDown)neg.push('Croisement MACD baissier récent');
      else if(a.macd.bullish)pos.push('MACD positif');
      else neg.push('MACD négatif');
    }
    if(a.structure==='bullish')pos.push('Structure de marché haussière (plus hauts et plus bas croissants)');
    else if(a.structure==='bearish')neg.push('Structure de marché baissière (plus bas et plus hauts décroissants)');
    else neg.push('Structure de marché encore indécise');
    const above50=a.ema50&&d.price>a.ema50,above200=a.ema200&&d.price>a.ema200;
    if(a.ema50&&a.ema200){
      if(above50&&above200)pos.push('Prix au-dessus des moyennes mobiles 50 et 200 jours');
      else if(!above50&&!above200)neg.push('Prix sous les moyennes mobiles 50 et 200 jours');
      else neg.push('Moyennes mobiles non alignées — signal mixte');
    }
    if(a.volTrend){
      if(a.volTrend.rising)pos.push('Volume en hausse sur 7 jours — flux plus actifs');
      else if(a.volTrend.falling)neg.push('Volume en baisse sur 7 jours — mouvement peu confirmé');
    }
    if(!pos.length)pos.push('Aucun signal fort positif identifié pour l\'instant');
    if(!neg.length)neg.push('Aucune fragilité majeure détectée pour l\'instant');
    let conclusion;
    if(confScore<40)conclusion='Signaux contradictoires — la prudence est de mise avant toute conclusion.';
    else if(pos.length>neg.length)conclusion=confScore>=70?'Contexte favorable, avec un bon niveau de confiance.':'Contexte prometteur mais encore fragile.';
    else if(neg.length>pos.length)conclusion=confScore>=70?'Contexte défavorable, avec un bon niveau de confiance.':'Contexte fragile, la prudence reste de mise.';
    else conclusion='Signaux équilibrés — aucune direction ne se dégage nettement.';
    return{positives:pos,negatives:neg,conclusion};
  },

  // ── MOTEUR D'INVALIDATION (obligatoire) : « Qu'est-ce qui ferait changer d'avis ? » ──
  invalidationList(a){
    const items=[];
    const sup=a.supports&&a.supports[0],res=a.resistances&&a.resistances[0];
    if(a.regime.trend==='bullish'){
      if(sup)items.push(`Clôture sous le support ${FMT.price(sup)}`);
      items.push('Le MACD croise à la baisse');
      if(a.ema50)items.push(`Le prix retombe durablement sous l'EMA50 (${FMT.price(a.ema50)})`);
    }else if(a.regime.trend==='bearish'){
      if(res)items.push(`Clôture au-dessus de la résistance ${FMT.price(res)}`);
      items.push('Le MACD croise à la hausse');
      if(a.ema50)items.push(`Le prix repasse durablement au-dessus de l'EMA50 (${FMT.price(a.ema50)})`);
    }else{
      if(res)items.push(`Cassure haussière au-dessus de ${FMT.price(res)}`);
      if(sup)items.push(`Cassure baissière sous ${FMT.price(sup)}`);
    }
    if(a.volTrend&&a.volTrend.falling)items.push('Le volume continue de se contracter (mouvement non confirmé)');
    if(a.rsi!=null&&a.rsi>70)items.push('Le RSI retombe sous 70 après une phase de surachat');
    if(a.rsi!=null&&a.rsi<30)items.push('Le RSI repasse au-dessus de 30 sans rebond confirmé');
    return items.slice(0,4);
  },

  // ── MOTEUR DE CHANGEMENT (obligatoire) : vs dernière mise à jour enregistrée ──
  change(todaySnap,prevEntry,sym){
    if(!prevEntry)return{changed:null,text:'Première analyse enregistrée pour cet actif — pas encore d\'historique pour comparer.',deltaScore:null,deltaConfidence:null};
    const prev=prevEntry.coins&&prevEntry.coins[sym];
    if(!prev)return{changed:null,text:'Pas de donnée comparable pour la session précédente.',deltaScore:null,deltaConfidence:null};
    const deltaScore=(todaySnap.score!=null&&prev.score!=null)?todaySnap.score-prev.score:null;
    const deltaConfidence=(todaySnap.confidence!=null&&prev.confidence!=null)?todaySnap.confidence-prev.confidence:null;
    const reasons=[];
    if(prev.regime&&todaySnap.regime&&prev.regime!==todaySnap.regime)reasons.push('régime');
    if(prev.rsiBucket&&prev.rsiBucket!==todaySnap.rsiBucket)reasons.push('RSI');
    if(prev.macdBullish!=null&&prev.macdBullish!==todaySnap.macdBullish)reasons.push('MACD');
    if(prev.structure&&prev.structure!==todaySnap.structure)reasons.push('structure');
    if(prev.action&&prev.action!==todaySnap.action)reasons.push('action suggérée');
    const significant=(deltaScore!=null&&Math.abs(deltaScore)>=6)||(deltaConfidence!=null&&Math.abs(deltaConfidence)>=8)||reasons.length>0;
    if(!significant)return{changed:false,text:'Aucun changement significatif depuis la dernière mise à jour.',deltaScore,deltaConfidence};
    const parts=[];
    if(deltaConfidence!=null)parts.push(`Confiance ${prev.confidence}% → ${todaySnap.confidence}%`);
    if(deltaScore!=null)parts.push(`Score ${prev.score} → ${todaySnap.score}`);
    let text=parts.join(' · ');
    text+=reasons.length?(text?' — ':'')+`facteurs : ${reasons.join(', ')}.`:'.';
    return{changed:true,text,deltaScore,deltaConfidence};
  },

  // ── Bilan complet d'un actif : combine les 4 moteurs obligatoires ──
  // (appelé une seule fois par actif dans APP.processData, puis réutilisé
  // partout : carte Niveau 2, onglet détaillé, synthèse globale, historique)
  analyzeCoin(coin,a,d,prevEntry,freshness){
    const flags=this.contradictions(a,d.price);
    const confidence=this.assetConfidence(a,d.price,freshness,flags);
    const proCon=this.proCon(a,d,confidence.score);
    const invalidation=this.invalidationList(a);
    const index=this.decisionIndex(a.score,confidence.score);
    const todaySnap={score:a.score,confidence:confidence.score,regime:a.regime.trend,rsiBucket:this.rsiBucket(a.rsi),macdBullish:a.macd?a.macd.bullish:null,structure:a.structure,action:a.action};
    const change=this.change(todaySnap,prevEntry,coin.sym);
    return{confidence,proCon,invalidation,change,todaySnap,flags,index};
  },

  // ── Pondération dynamique par rôle (BTC régime / ETH qualité du capital /
  // SOL accélération / XRP rotation) — plus un actif montre une conviction
  // technique nette (score loin de 50), plus son poids se rapproche du haut
  // de sa fourchette indicative ; sinon il reste proche du bas. Renormalisé
  // en 2 passes pour respecter au mieux les fourchettes du brief tout en
  // garantissant un total de 100%. ──
  weights(state){
    const raw={};
    C.coins.forEach(c=>{
      const a=state[c.id]?.analysis;
      const conviction=a?Math.min(1,Math.abs(a.score-50)/50):0;
      const[lo,hi]=c.wRange;
      raw[c.id]=lo+conviction*(hi-lo);
    });
    const norm=src=>{const t=Object.values(src).reduce((x,y)=>x+y,0)||1;const o={};C.coins.forEach(c=>o[c.id]=src[c.id]/t*100);return o};
    const pass1=norm(raw);
    const clamped={};
    C.coins.forEach(c=>{const[lo,hi]=c.wRange;clamped[c.id]=Math.min(hi,Math.max(lo,pass1[c.id]))});
    return norm(clamped);
  },

  globalOpportunity(state,w){
    let total=0,wsum=0;
    C.coins.forEach(c=>{const a=state[c.id]?.analysis;if(!a)return;total+=a.score*(w[c.id]||0);wsum+=w[c.id]||0});
    return wsum?Math.round(total/wsum):50;
  },

  globalRisk(state,w){
    const map={low:20,medium:55,high:88};
    let total=0,wsum=0;
    C.coins.forEach(c=>{const a=state[c.id]?.analysis;if(!a)return;total+=(map[a.risk]||55)*(w[c.id]||0);wsum+=w[c.id]||0});
    const score=wsum?total/wsum:55;
    return{score:Math.round(score),label:score<35?'Faible':score<65?'Moyen':'Élevé',emoji:score<35?'🟢':score<65?'🟡':'🔴'};
  },

  globalConfidence(state,w,anomalyFlag){
    let total=0,wsum=0;
    C.coins.forEach(c=>{const cf=state[c.id]?.copilot?.confidence;if(!cf)return;total+=cf.score*(w[c.id]||0);wsum+=w[c.id]||0});
    let score=wsum?total/wsum:50;
    if(anomalyFlag)score-=5;
    score=Math.min(100,Math.max(0,Math.round(score)));
    return{score,...this.levelOf(score)};
  },

  // Rôle XRP : rotation / décorrélation. Utilise uniquement les données déjà
  // récupérées (variation 24h) — aucun appel supplémentaire.
  xrpAnomaly(state){
    const xrp=state.ripple,btc=state.bitcoin;
    if(!xrp||!btc||xrp.change24h==null||btc.change24h==null)
      return{flag:false,text:'Données insuffisantes pour évaluer une rotation inhabituelle.'};
    const xc=xrp.change24h,bc=btc.change24h;
    const flag=(Math.sign(xc)!==Math.sign(bc)&&Math.abs(xc)>3)||Math.abs(xc-bc)>8;
    return{flag,text:flag
      ?`Mouvement inhabituel : XRP ${FMT.pct(xc)} sur 24h contre BTC ${FMT.pct(bc)} — décorrélation notable.`
      :'Aucune rotation inhabituelle détectée — XRP évolue globalement en ligne avec BTC.'};
  },

  // Proxy de sentiment interne (rôle BTC). À ne jamais présenter comme
  // l'indice Fear & Greed officiel — il s'agit d'une estimation dérivée
  // uniquement du RSI et du régime déjà calculés, sans source externe.
  sentimentProxy(a){
    if(a.rsi==null)return null;
    const trendAdj=a.regime.trend==='bullish'?a.regime.conf:a.regime.trend==='bearish'?(100-a.regime.conf):50;
    const score=Math.min(100,Math.max(0,Math.round(a.rsi*0.6+trendAdj*0.4)));
    const label=score<25?'Peur extrême':score<45?'Peur':score<55?'Neutre':score<75?'Avidité':'Avidité extrême';
    return{score,label};
  },

  // ── État du marché (5 états du brief) — classification déterministe à
  // partir du régime BTC, du RSI BTC et de la qualité de la participation
  // (score ETH), pour rester explicable. ──
  classifyState(state,opportunity){
    const btcA=state.bitcoin?.analysis;
    if(!btcA)return{key:'unknown',emoji:'⚪',label:'Données insuffisantes'};
    const ethScore=state.ethereum?.analysis?.score||0;
    const trend=btcA.regime.trend,rsi=btcA.rsi!=null?btcA.rsi:50;
    const momentumFading=btcA.macd?(btcA.macd.crossDown||!btcA.macd.bullish):false;
    if(rsi>=72&&momentumFading&&trend!=='bullish')return{key:'distribution',emoji:'🟠',label:'Distribution'};
    if(trend==='bearish')return{key:'prudence',emoji:'🔴',label:'Prudence'};
    if(trend==='bullish'){
      if(opportunity>=62&&ethScore>=50)return{key:'expansion',emoji:'🟢',label:'Expansion'};
      return{key:'transition',emoji:'🟡',label:'Transition'};
    }
    if(rsi<=42&&opportunity>=45)return{key:'accumulation',emoji:'🟢',label:'Accumulation'};
    return{key:'transition',emoji:'🟡',label:'Transition'};
  },

  // ── MOTEUR D'INACTION (obligatoire) : le copilote doit pouvoir dire
  // explicitement « ne rien faire », sans jamais forcer une action. ──
  todayActions(stateKey,confidenceLevel,hasHistory,anyChanged){
    const bullets=[];
    switch(stateKey){
      case'accumulation':bullets.push('Poursuivre une accumulation prudente (DCA), si déjà engagée','Rien d\'urgent à faire dans l\'immédiat');break;
      case'expansion':bullets.push('Conditions favorables à un renforcement progressif','Rester attentif à un essoufflement du momentum');break;
      case'distribution':bullets.push('Éviter toute nouvelle entrée tant que la structure ne se clarifie pas','Confirmation nécessaire avant un renforcement');break;
      case'prudence':bullets.push('Capital préservé, pas de nouvelle position','Attendre une confirmation de stabilisation');break;
      default:bullets.push('Attendre une confirmation avant d\'agir','Aucune action nécessaire pour l\'instant');
    }
    let isInaction=false,why=null;
    if(confidenceLevel==='low'){
      isInaction=true;
      why='Le niveau de confiance est trop faible pour justifier une action — les signaux se contredisent.';
    }else if(hasHistory&&!anyChanged){
      isInaction=true;
      why='Le contexte n\'a pas changé de façon significative depuis la dernière mise à jour.';
    }
    return{bullets,isInaction,why};
  },

  // Choisit l'actif dont le changement pèse le plus dans la synthèse globale
  // (ex. « ETH améliore le contexte. »), ou un message honnête si rien à
  // comparer / rien de significatif.
  globalChangeSummary(state){
    const verbs={up:'améliore le contexte',down:'fragilise le contexte'};
    const ranked=C.coins.map(c=>({coin:c,ch:state[c.id]?.copilot?.change})).filter(x=>x.ch);
    if(!ranked.length)return'Données insuffisantes pour évaluer un changement.';
    if(ranked.every(x=>x.ch.changed===null))return'Première session enregistrée — pas encore d\'historique pour comparer.';
    const changedOnes=ranked.filter(x=>x.ch.changed);
    if(!changedOnes.length)return'Aucun changement significatif depuis la dernière mise à jour.';
    changedOnes.sort((x,y)=>{
      const sx=Math.abs((x.ch.deltaConfidence||0)+(x.ch.deltaScore||0)*0.5);
      const sy=Math.abs((y.ch.deltaConfidence||0)+(y.ch.deltaScore||0)*0.5);
      return sy-sx;
    });
    const top=changedOnes[0];
    const net=(top.ch.deltaConfidence||0)+(top.ch.deltaScore||0)*0.5;
    return`${top.coin.sym} ${net>=0?verbs.up:verbs.down}.`;
  },

  // ── Synthèse globale : combine les 4 actifs selon leur rôle ──
  globalSynthesis(state){
    const w=this.weights(state);
    const opportunity=this.globalOpportunity(state,w);
    const risk=this.globalRisk(state,w);
    const anomaly=this.xrpAnomaly(state);
    const confidence=this.globalConfidence(state,w,anomaly.flag);
    const index=this.decisionIndex(opportunity,confidence.score);
    const stateInfo=this.classifyState(state,opportunity);
    const changeText=this.globalChangeSummary(state);
    const changes=C.coins.map(c=>state[c.id]?.copilot?.change).filter(Boolean);
    const hasHistory=changes.some(c=>c.changed!==null);
    const anyChanged=changes.some(c=>c.changed===true);
    const actions=this.todayActions(stateInfo.key,confidence.level,hasHistory,anyChanged);
    return{state:stateInfo,opportunity,risk,confidence,index,weights:w,anomaly,changeText,actions,hasHistory};
  }
};

const CHARTS = {
  instances:{},
  destroy(id){if(this.instances[id]){this.instances[id].destroy();delete this.instances[id]}},
  create(canvasId,config){
    if(typeof Chart==='undefined'){console.warn('Chart.js indisponible (CDN bloqué/hors-ligne) — graphique ignoré :',canvasId);return}
    this.destroy(canvasId);
    const el=document.getElementById(canvasId);
    if(!el)return;
    try{this.instances[canvasId]=new Chart(el,config)}
    catch(e){console.warn('Échec création du graphique',canvasId,e)}
  },

  // Lit les CSS vars au moment de la création → s'adapte automatiquement au thème courant
  _colors(){
    const s=getComputedStyle(document.documentElement);
    const v=n=>s.getPropertyValue(n).trim();
    return{
      grid:  v('--chart-grid'),
      ttBg:  v('--chart-tooltip-bg'),
      ttBdr: v('--chart-border'),
      title: v('--tp'),
      body:  v('--ts'),
      tick:  v('--ts'),
    };
  },

  priceChart(canvasId,labels,prices,color,period){
    const sl=prices.slice(-period),ll=labels.slice(-period);
    const cc=this._colors();
    this.create(canvasId,{
      type:'line',
      data:{labels:ll,datasets:[{data:sl,borderColor:color,borderWidth:1.5,fill:true,
        backgroundColor:ctx=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,220);g.addColorStop(0,color+'33');g.addColorStop(1,color+'00');return g},
        tension:.35,pointRadius:0,pointHoverRadius:4}]},
      options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
        plugins:{legend:{display:false},tooltip:{backgroundColor:cc.ttBg,borderColor:cc.ttBdr,borderWidth:1,titleColor:cc.title,bodyColor:cc.body,padding:10,callbacks:{label:c=>' '+FMT.price(c.raw)}}},
        scales:{x:{display:false},y:{display:true,position:'right',grid:{color:cc.grid},ticks:{color:cc.tick,font:{family:"'JetBrains Mono'",size:10},callback:v=>FMT.price(v)}}}}
    });
  },

  donut(canvasId,bear,neu,bull){
    const cc=this._colors();
    this.create(canvasId,{
      type:'doughnut',
      data:{labels:['Haussier','Neutre','Baissier'],
        datasets:[{data:[bull,neu,bear],backgroundColor:['#10B981','#F59E0B','#F43F5E'],borderWidth:0,hoverOffset:5}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'70%',
        plugins:{legend:{display:false},tooltip:{backgroundColor:cc.ttBg,borderColor:cc.ttBdr,borderWidth:1,titleColor:cc.title,bodyColor:cc.body,padding:8,callbacks:{label:c=>' '+c.label+' : '+c.raw+'%'}}}}
    });
  }
};

    // ── NIVEAU 3 (au niveau vue d'ensemble) : contexte marché + tableau, replié ──
    const ctxCards=`
      <div class="card card-sm"><div class="ind-label">Dominance BTC</div><div class="ind-val num" style="color:var(--btc)">${dominance?dominance.toFixed(1)+'%':'N/A'}</div></div>

      <div class="card card-sm"><div class="ind-label">Pondération du jour</div><div class="ind-val" style="font-size:12px">${C.coins.map(c=>`${c.sym} ${Math.round(g.weights[c.id]||0)}%`).join(' · ')}</div></div>
    `;
    const scoreRows=C.coins.map(c=>{
      const d=state[c.id];if(!d)return'';const a=d.analysis,idx=d.copilot?.index;
      const sc=this.scoreColor(a.score);
      const si=TEXT.scoreInterp(a.score);
      return`<tr><td><span style="color:${c.color};font-weight:600">${c.sym}</span></td>
        <td class="mono">${FMT.price(d.price)}</td>
        <td class="mono ${d.change24h>=0?'pos':'neg'}">${FMT.pct(d.change24h)}</td>

        <td>${a.signal.emoji} ${a.signal.label}</td>
        <td><span class="${this.actionCls2(a.action)}">${TEXT.actionLabel(a.action)}</span></td></tr>`;

    el.innerHTML=`
      <div class="section">${marketView}</div>
      <div class="section"><div class="cop-grid">${cards}</div></div>
      <div class="section">
        <details class="evidence" ${MODE.current()==='expert'?'open':''}>
          <summary>Contexte marché &amp; tableau de synthèse détaillé</summary>
          <div class="evidence-body">
            <div class="grid-4" style="margin-bottom:16px">${ctxCards}</div>
            <div class="card" style="padding:0;overflow:hidden">
              <table style="width:100%;border-collapse:collapse">
                <thead><tr style="background:var(--s2)">
                  <th style="padding:9px 12px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--tm);text-align:left">Actif</th>
                  <th style="padding:9px 8px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--tm);text-align:left">Prix</th>
                  <th style="padding:9px 8px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--tm);text-align:left">24h</th>
                  <th style="padding:9px 8px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--tm);text-align:left">RSI</th>
                  <th style="padding:9px 8px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--tm);text-align:left">Score</th>
                  <th style="padding:9px 8px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--tm);text-align:left">Indice</th>
                  <th style="padding:9px 8px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--tm);text-align:left">Signal</th>
                  <th style="padding:9px 8px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--tm);text-align:left">Lecture</th>
                </tr></thead>
                <tbody>${scoreRows}</tbody>
              </table>
            </div>
          </div>
        </details>
      </div>`;
  },

  // ── ASSET TAB ──
  assetTab(coin,d,state){
    const a=d.analysis,prices=a.prices,cp=d.copilot;
    const e20=this.fmtEma(a.ema20,d.price),e50=this.fmtEma(a.ema50,d.price);
    const e100=this.fmtEma(a.ema100,d.price),e200=this.fmtEma(a.ema200,d.price);
    const athDist=a.ath?((a.ath-d.price)/a.ath*100).toFixed(1)+'%':'N/A';
    const si=TEXT.scoreInterp(a.score);
    const ac=TEXT.actionClass(a.action);
    const hor=TEXT.horizons(a.action);

    // Signals for regime
    const sigItems=[
      {ic:a.ema20&&d.price>a.ema20?'🟢':'🔴',txt:`Prix vs EMA20 : ${a.ema20&&d.price>a.ema20?'au-dessus':'en-dessous'} (${FMT.price(a.ema20)})`},
      {ic:a.ema50&&d.price>a.ema50?'🟢':'🔴',txt:`Prix vs EMA50 : ${a.ema50&&d.price>a.ema50?'au-dessus':'en-dessous'} (${FMT.price(a.ema50)})`},
      {ic:a.ema200&&d.price>a.ema200?'🟢':'🔴',txt:`Prix vs EMA200 : ${a.ema200&&d.price>a.ema200?'au-dessus':'en-dessous'}`},
      {ic:a.macd?.bullish?'🟢':'🔴',txt:`MACD : ${a.macd?.bullish?'positif (haussier)':'négatif (baissier)'}`+(a.macd?.crossUp?' — crossover haussier récent':a.macd?.crossDown?' — crossover baissier récent':'')},
      {ic:a.rsi&&a.rsi>50?'🟢':'🔴',txt:`RSI ${FMT.num(a.rsi,1)} : ${a.rsi&&a.rsi<30?'survente extrême':a.rsi&&a.rsi>70?'surachat':a.rsi&&a.rsi>50?'momentum positif':'momentum négatif'}`},
      {ic:a.structure==='bullish'?'🟢':a.structure==='bearish'?'🔴':'🟡',txt:`Structure de marché : ${a.structure==='bullish'?'HH/HL haussière':a.structure==='bearish'?'LH/LL baissière':'neutre / indéterminée'}`}
    ];
    if(a.regime.reasons.length)a.regime.reasons.forEach(r=>sigItems.push({ic:'ℹ️',txt:r}));

    // Levels HTML
    const resLevels=a.resistances.map(r=>`<div class="level-row"><span class="lv-pill lv-res">Résistance</span><span class="lv-price">${FMT.price(r)}</span><span class="lv-note">Zone de résistance identifiée</span>${this.levelStatus('')}</div>`).join('');
    const curLevel=`<div class="level-row" style="background:rgba(245,158,11,.05)"><span class="lv-pill lv-cur">Prix actuel</span><span class="lv-price" style="color:var(--warn)">${FMT.price(d.price)}</span><span class="lv-note">−${athDist} depuis ATH</span></div>`;
    const supLevels=a.supports.map((s,i)=>`<div class="level-row"><span class="lv-pill lv-sup">Support</span><span class="lv-price">${FMT.price(s)}</span><span class="lv-note">${i===0?'Support majeur immédiat':'Support secondaire'}</span>${this.levelStatus(i===0&&d.change24h<-2?'tested':'')}</div>`).join('');

    // Opinion block
    let opBlock='';
    if(coin.hasOpinion){
      const opFn=OPINIONS[coin.cls];
      if(opFn){
        const op=opFn(a,d.price);
        opBlock=`
          <div class="section">
            <div class="sh"><span class="sh-num">10</span><span class="sh-title">Opinion qualitative</span></div>
            <div class="opinion-card">
              <div class="op-verdict-row">
                <span class="op-verdict-badge ${op.verdict.cls}">${op.verdict.v}</span>
                ${op.pctFromAth?`<span class="tag">−${op.pctFromAth}% depuis ATH</span>`:''}
              </div>
              <div class="op-strengths">
                <div class="op-heading">✅ Points forts</div>
                ${op.str.map(s=>`<div class="op-point"><span class="op-point-ic">✓</span><span>${s}</span></div>`).join('')}
              </div>
              <div class="op-weaknesses">
                <div class="op-heading">⚠️ Points faibles</div>
                ${op.wk.map(w=>`<div class="op-point"><span class="op-point-ic" style="color:var(--bear)">✗</span><span>${w}</span></div>`).join('')}
              </div>
              <div class="accumulate-box">
                <div class="acc-q">« Est-ce une crypto que j'aurais envie d'accumuler aujourd'hui ? »</div>
                <div class="acc-a ${op.acc==='Non'?'neg':op.acc.startsWith('Oui')?'pos':'neu'}">${op.acc}</div>
                <div style="font-size:12px;color:var(--ts);margin-top:4px">${op.accExpl}</div>
              </div>
            </div>
          </div>`;
      }
    }

    const el=document.getElementById('tab-'+coin.cls);
    el.innerHTML=`
      <!-- HEADER -->
      <div class="asset-dh">
        <div class="adh-logo" style="background:${coin.color}22;color:${coin.color}">${coin.short}</div>
        <div>
          <div style="font-size:12px;color:var(--ts);margin-bottom:3px">${coin.name} / ${FX.currency}</div>
          <div class="adh-price">${FMT.price(d.price)}</div>
          <div class="adh-changes">
            <span class="${d.change24h>=0?'pos':'neg'}">${FMT.pct(d.change24h)}</span>
            <span>· 7j : <span class="${(d.change7d||0)>=0?'pos':'neg'}">${FMT.pct(d.change7d)}</span></span>
            <span>· Vol : ${FMT.vol(d.volume)}</span>

        </div>
        <div class="adh-meta">
          <div class="adh-regime" title="${a.regime.label}">${a.regime.emoji}</div>
          <div class="adh-regime-txt">${a.regime.label}</div>
          <div style="font-size:11px;color:var(--ts);margin-top:4px">Confiance régime : <span class="num">${a.regime.conf}%</span></div>
        </div>
      </div>

      <!-- CHART -->
      <div class="section">
        <div class="chart-wrap" id="${coin.cls}-chart-wrap">

              <button class="cc-btn active" id="${coin.cls}-p7" onclick="R.switchPeriod('${coin.cls}',7)">7J</button>

              <button class="cc-btn" id="${coin.cls}-p90" onclick="R.switchPeriod('${coin.cls}',90)">90J</button>

      </div>

      <!-- QUE FAIRE AUJOURD'HUI ? (décision visible immédiatement) -->
      <div class="section">
        <div class="sh"><span class="sh-num">01</span><span class="sh-title">Que faire aujourd'hui ?</span></div>
        <div class="card">
          <div class="simple-card"><div class="simple-q">Que se passe-t-il aujourd'hui ?</div><div class="simple-a">${TEXT.situation(coin.sym,a,d.change24h)}</div></div>
          <div class="simple-card"><div class="simple-q">Pourquoi ça monte ou baisse ?</div><div class="simple-a">${TEXT.why(a,d.change24h,d.change7d,d.price)}</div></div>
          <div class="simple-card"><div class="simple-q">Est-ce un bon moment pour investir ?</div><div class="simple-a">${TEXT.timing(a)}</div></div>

            <div class="ab-pre">AUJOURD'HUI</div>
            <div class="ab-action">${TEXT.actionLabel(a.action)}</div>

          </div>
          <div class="risk-horizon">
            <div class="rh-item"><span class="rh-label">Risque :</span><span class="rh-val">${TEXT.riskLabel(a.risk)}</span></div>
            <div class="rh-item"><span class="rh-label">CT :</span><span class="rh-val">${hor.ct}</span></div>
            <div class="rh-item"><span class="rh-label">MT :</span><span class="rh-val">${hor.mt}</span></div>
            <div class="rh-item"><span class="rh-label">LT :</span><span class="rh-val">${hor.lt}</span></div>
          </div>
        </div>
      </div>

      <!-- CONFIANCE (obligatoire) -->
      <div class="section">
        <div class="sh"><span class="sh-num">02</span><span class="sh-title">Confiance du copilote</span></div>
        <div class="engine-card">
          <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:12px">
            <span class="conf-pill conf-${cp.confidence.level}" style="font-size:13px;padding:7px 14px">${cp.confidence.emoji} ${cp.confidence.score}% — Confiance ${cp.confidence.label}</span>
            <span style="font-size:12px;color:var(--ts);flex:1;min-width:200px">Confiance ≠ opportunité : un score d'attractivité élevé avec une confiance faible invite à attendre une confirmation plutôt qu'à agir.</span>
          </div>
          <div class="conf-breakdown exp-only">
            <div class="conf-factor-row"><span>Accord entre indicateurs</span><b>${cp.confidence.factors.agreement}%</b></div>
            <div class="conf-factor-row"><span>Fraîcheur des données</span><b>${cp.confidence.factors.freshness}%</b></div>
            <div class="conf-factor-row"><span>Cohérence multi-timeframe (7j / 30j / 90j)</span><b>${cp.confidence.factors.multiTF}%</b></div>
            <div class="conf-factor-row"><span>Absence de contradictions (${cp.confidence.factors.flagsCount} détectée${cp.confidence.factors.flagsCount===1?'':'s'})</span><b>${cp.confidence.factors.contradictions}%</b></div>
          </div>

      </div>

      <!-- MOTEUR CONTRADICTOIRE (obligatoire) -->
      <div class="section">

            </div>
            <div class="signal-grid">${sigItems.map(s=>`<div class="sig-item"><span class="sig-ic">${s.ic}</span><span>${s.txt}</span></div>`).join('')}</div>
          </div>
        </div>

        <!-- INDICATEURS -->
        <div class="section">
          <div class="sh"><span class="sh-num">08</span><span class="sh-title">Indicateurs techniques</span></div>

              <div class="rsi-bar-wrap"><div class="rsi-cursor" style="left:${a.rsi||50}%"></div></div>

            </div>

              <div class="ind-label">MACD</div>

              <div class="ind-note">${a.macd?.crossUp?'🟢 Crossover haussier !':a.macd?.crossDown?'🔴 Crossover baissier !':a.macd?.bullish?'Haussier (MACD > Signal)':'Baissier (MACD < Signal)'}</div>

          <div class="grid-4 exp-only" style="margin-bottom:12px">

                    <td class="mono">${e.txt}</td>
                    <td class="mono ${e.cls||''}">${e.note||'N/A'}</td>
                    <td><span style="color:${e.cls==='pos'?'var(--bull)':'var(--bear)'}">${e.cls==='pos'?'▲ Au-dessus':'▼ En-dessous'}</span></td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>

        <!-- NIVEAUX -->
        <div class="section">
          <div class="sh"><span class="sh-num">09</span><span class="sh-title">Niveaux clés</span></div>
          <div class="card"><div class="interp-line">💬 ${TEXT.levelsExplain(a,d.price)}</div>${resLevels}${curLevel}${supLevels}</div>
        </div>

        ${opBlock}

        <!-- SCÉNARIOS -->
        <div class="section">
          <div class="sh"><span class="sh-num">11</span><span class="sh-title">Scénarios probabilistes</span></div>
          <div class="card">
            <div class="interp-line">💬 ${TEXT.scenariosExplain(a.scenarios)}</div>
            <div class="scen-layout">
              <div>
                <div class="scen-chart-wrap"><canvas id="scen-${coin.cls}" role="img" aria-label="Probabilités des scénarios"></canvas></div>
                <div class="scen-legend">
                  <div class="scen-leg"><span class="leg-dot" style="background:var(--bull)"></span>Haussier ${a.scenarios.bull}%</div>
                  <div class="scen-leg"><span class="leg-dot" style="background:var(--warn)"></span>Neutre ${a.scenarios.neu}%</div>
                  <div class="scen-leg"><span class="leg-dot" style="background:var(--bear)"></span>Baissier ${a.scenarios.bear}%</div>
                </div>
              </div>
              <div class="scen-items">
                <div class="scen-card bear">
                  <div class="scen-top"><span class="scen-name neg">↓ Baissier</span><span class="scen-pct neg">${a.scenarios.bear}%</span></div>
                  <div class="scen-bar-bg"><div class="scen-bar-f" style="width:${a.scenarios.bear}%;background:var(--bear)"></div></div>
                  <div class="scen-desc">Cassure des supports majeurs, poursuite de la baisse. Outflows ETF persistants, macro hawkish, absence de catalyseur.</div>
                  <div class="scen-triggers"><strong>Déclencheur :</strong> Clôture sous ${FMT.price(a.supports[0]||d.price*0.9)}</div>
                </div>
                <div class="scen-card neu">
                  <div class="scen-top"><span class="scen-name neu">→ Neutre</span><span class="scen-pct neu">${a.scenarios.neu}%</span></div>
                  <div class="scen-bar-bg"><div class="scen-bar-f" style="width:${a.scenarios.neu}%;background:var(--warn)"></div></div>
                  <div class="scen-desc">Consolidation en range. Ni breakout ni breakdown. Marché attentiste, volumes faibles.</div>
                  <div class="scen-triggers"><strong>Invalidation :</strong> Breakout ${FMT.price(a.resistances[0]||d.price*1.1)} ou breakdown ${FMT.price(a.supports[0]||d.price*0.9)}</div>
                </div>
                <div class="scen-card bull">
                  <div class="scen-top"><span class="scen-name pos">↑ Haussier</span><span class="scen-pct pos">${a.scenarios.bull}%</span></div>
                  <div class="scen-bar-bg"><div class="scen-bar-f" style="width:${a.scenarios.bull}%;background:var(--bull)"></div></div>
                  <div class="scen-desc">Retour des flux ETF, pivot Fed ou short squeeze. Reprise au-dessus des EMA clés.</div>
                  <div class="scen-triggers"><strong>Déclencheur :</strong> Clôture hebdo au-dessus ${FMT.price(a.resistances[0]||d.price*1.08)}</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        </div>
        </details>
      </div>
    `;

    // Init charts — double rAF : on attend 2 frames pour être certain que le
    // canvas a été mis en page (dimensions réelles) avant d'initialiser
    // Chart.js, plus fiable qu'un délai arbitraire (setTimeout 50ms).
    const allPrices=a.prices.full;
    const allDates=allPrices.map((_,i)=>{const d2=new Date();d2.setDate(d2.getDate()-(allPrices.length-1-i));return FMT.date(d2)});
    APP._chartData[coin.cls]={prices:allPrices,dates:allDates,color:coin.color,period:7};
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      CHARTS.priceChart(`chart-${coin.cls}`,allDates,allPrices,coin.color,7);
      CHARTS.donut(`scen-${coin.cls}`,a.scenarios.bear,a.scenarios.neu,a.scenarios.bull);
    }));
  },

  switchPeriod(cls,p){
    ['7','30','90'].forEach(n=>{
      const b=document.getElementById(`${cls}-p${n}`);
      if(b)b.classList.toggle('active',parseInt(n)===p);
    });
    const cd=APP._chartData[cls];if(!cd)return;
    CHARTS.priceChart(`chart-${cls}`,cd.dates,cd.prices,cd.color,p);
  },

  actionCls(action){
    if(action==='buy')return'sc-action pos';if(action==='avoid')return'sc-action neg';
    if(action==='dca')return'sc-action neu';return'sc-action muted';
  },
  actionCls2(action){
    if(action==='buy')return'pos fw6';if(action==='avoid')return'neg fw6';
    if(action==='dca')return'neu fw6';return'muted';
  },

  // ── EXECUTIVE SUMMARY ──
  execSummary(state,dominance){
    const el=document.getElementById('tab-exec');if(!el)return;
    const scores=C.coins.map(c=>({coin:c,d:state[c.id],s:state[c.id]?.analysis?.score||0}));
    const best=scores.reduce((a,b)=>a.s>b.s?a:b);
    const worst=scores.reduce((a,b)=>a.s<b.s?a:b);
    const btcA=state.bitcoin?.analysis;
    const globalTrend=btcA?.regime?.trend||'neutral';
    const globalEmoji=btcA?.regime?.emoji||'🟡';

    // Best action across all coins
    const actions=scores.map(({coin,d})=>({sym:coin.sym,action:d?.analysis?.action||'wait'}));
    const hasBuy=actions.some(a=>a.action==='buy');
    const hasDca=actions.some(a=>a.action==='dca');
    const globalAction=hasBuy?'buy':hasDca?'dca':globalTrend==='bearish'?'avoid':'wait';
    const ac=TEXT.actionClass(globalAction);

    const perRow=scores.map(({coin,d})=>{
      if(!d)return'';const a=d.analysis;
      const actionKind=TEXT.actionClass(a.action).replace('action-','');
      const actionTxtCls={dca:'neu',buy:'pos',avoid:'neg'}[actionKind]||'muted';
      return`<div class="exec-row">
        <span class="exec-lbl"><span style="color:${coin.color};font-weight:600">${coin.sym}</span></span>
        <span class="exec-val">${a.signal.emoji} ${a.signal.label} · Score ${a.score}/100 · <span class="${actionTxtCls}">${TEXT.actionLabel(a.action)}</span></span>
      </div>`;
    }).join('');

    el.innerHTML=`
      <div class="section">
        <div class="sh"><span class="sh-num">10</span><span class="sh-title">Résumé exécutif</span></div>
        <div class="exec-card">
          <div class="exec-verdict">${globalEmoji} Marché ${globalTrend==='bullish'?'haussier':globalTrend==='bearish'?'baissier':'en transition'}</div>
          <div class="exec-row"><span class="exec-lbl">Régime global</span><span class="exec-val">${btcA?.regime?.label||'N/A'}</span></div>
          <div class="exec-row"><span class="exec-lbl">Actif le plus fort</span><span class="exec-val" style="color:${best.coin.color}">${best.coin.name} — Score ${best.s}/100</span></div>
          <div class="exec-row"><span class="exec-lbl">Actif le plus faible</span><span class="exec-val" style="color:${worst.coin.color}">${worst.coin.name} — Score ${worst.s}/100</span></div>
          <div class="exec-row"><span class="exec-lbl">Dominance BTC</span><span class="exec-val num" style="color:var(--btc)">${dominance?dominance.toFixed(1)+'%':'N/A'}</span></div>
          ${perRow}
          <div class="exec-action">
            <div class="exec-action-label">SYNTHÈSE DU JOUR</div>
            <div class="exec-action-val ${globalAction==='buy'?'pos':globalAction==='avoid'?'neg':globalAction==='dca'?'neu':'muted'}">${TEXT.actionLabel(globalAction)}</div>
            <div class="exec-one">${TEXT.execOneLiner(state)}</div>
          </div>
        </div>
      </div>`;
  },

  // ── HISTORY TAB ──
  historyTab(entries){
    const el=document.getElementById('tab-history');if(!el)return;
    if(!entries||!entries.length){el.innerHTML='<div class="card" style="margin:20px 0;text-align:center;color:var(--ts)">Aucun historique disponible. L\'historique se constitue au fil des sessions.</div>';return}
    const sorted=[...entries].sort((a,b)=>b.ts-a.ts);
    const rows=sorted.map(e=>{
      const cs=Object.entries(e.coins||{}).map(([sym,d])=>`<td class="mono" style="color:var(--ts)">${FMT.price(d.price)}</td><td class="mono" style="color:${d.rsi<30?'var(--bull)':d.rsi>70?'var(--bear)':'var(--warn)'}">${d.rsi?d.rsi.toFixed(0):'—'}</td><td><span style="color:${d.score>65?'var(--bull)':d.score>40?'var(--warn)':'var(--bear)'}">${d.score||'—'}</span></td>`).join('');
      return`<tr><td class="mono" style="color:var(--ts)">${e.date}</td>${cs}</tr>`;
    }).join('');

    el.innerHTML=`
      <div class="section">
        <div class="sh"><span class="sh-num">HIST</span><span class="sh-title">Historique quotidien</span><span class="sh-sub">${entries.length} jours enregistrés</span></div>
        <div class="card" style="padding:0;overflow:auto">
          <table class="hist-table">
            <thead><tr><th>Date</th>${C.coins.map(c=>`<th colspan="3" style="color:${c.color}">${c.sym}</th>`).join('')}</tr>
            <tr><th></th>${C.coins.map(()=>'<th>Prix</th><th>RSI</th><th>Score</th>').join('')}</tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  }
};

// ═══════════════════════════════════════════════════
//  APPLICATION CONTROLLER
// ═══════════════════════════════════════════════════
const APP = {
  _state:{},_dominance:0,_global:null,_timer:null,_countdown:0,_histEntries:[],_currentTab:'overview',_chartData:{},_initialized:false,
  _refreshing:false,_lastClickTs:0,_lastSyncTs:null,_lastSource:null,_dotState:'loading',

  async init(){
    if(this._initialized)return;
    this._initialized=true;
    THEME.init();                    // initialise le bouton (data-theme déjà appliqué par anti-flash)
    MODE.init();                     // initialise les boutons de niveau pédagogique (data-mode déjà appliqué par anti-flash)
    await FX.init();                 // charge taux + préférence devise (peut faire 1 fetch si EUR+cache périmé)
    this._loadPersistedStatus();
    this.initTabKeyboardNav();
    this._histEntries=HISTORY.load();
    R.historyTab(this._histEntries);
    this.setStatus('loading','Chargement…');
    try{
      await this.fetchAndRender();
    }catch(e){
      // Échec dès le premier chargement : on tente d'afficher n'importe quel
      // cache existant (même ancien) avant d'abandonner, pour garder le tableau
      // de bord exploitable au lieu d'un écran d'erreur vide.
      const cachedRaw=HISTORY.getCached(null);
      if(cachedRaw){
        try{
          // On transmet l'horodatage réel du cache (potentiellement très
          // ancien) pour que le score de CONFIANCE reflète honnêtement la
          // fraîcheur réelle des données affichées.
          await this.processData(cachedRaw.data,cachedRaw.ts);
          this._lastSource=cachedRaw.data.source||'coingecko';
          this.setStatus('error','Données temporairement indisponibles');
          this.showSyncBanner();
        }catch{this.showError(e);}
      }else{
        this.showError(e);
      }
    }
    this.startRefreshTimer();
  },

  async fetchAndRender(){
    const raw=await API.fetchAll();
    await this.processData(raw);
    this._lastSyncTs=Date.now();
    this._lastSource=raw.source||'coingecko';
    this._persistStatus();
    this.setStatus('live',this._liveLabel());
    this.hideSyncBanner();
  },

  _liveLabel(){
    return this._lastSource==='coinpaprika'?'En direct (secours CoinPaprika)':'En direct (CoinGecko)';
  },
  _formatTime(ts){return ts?new Date(ts).toLocaleTimeString('fr-FR'):'—'},
  _persistStatus(){try{localStorage.setItem(C.STATUS_KEY,JSON.stringify({ts:this._lastSyncTs,source:this._lastSource}))}catch{}},
  _loadPersistedStatus(){
    try{
      const s=JSON.parse(localStorage.getItem(C.STATUS_KEY));
      if(s){this._lastSyncTs=s.ts;this._lastSource=s.source}
    }catch{}
  },

  async processData(raw,asOfTs=Date.now()){
    const{markets,global:gData,histories}=raw;
    this._dominance=gData?.data?.market_cap_percentage?.btc||0;
    this._state={};
    // "Hier" au sens du moteur de changement = dernière session enregistrée
    // avant aujourd'hui. Lu AVANT l'écrasement par HISTORY.snapshot() plus bas.
    const prevEntry=HISTORY.previous(this._histEntries);
    const freshness=COPILOT.freshness(asOfTs,raw.source);
    for(const coin of C.coins){
      const mkt=markets.find(m=>m.id===coin.id);
      const hist=histories[coin.id];
      if(!mkt||!hist)continue;
      const prices=hist.prices.map(p=>p[1]);
      const analysis=SIGNALS.analyze(coin.id,prices,mkt.current_price,mkt,this._dominance,hist.total_volumes);
      if(!analysis)continue;
      const d={price:mkt.current_price,change24h:mkt.price_change_percentage_24h,change7d:mkt.price_change_percentage_7d_in_currency,change30d:mkt.price_change_percentage_30d_in_currency,volume:mkt.total_volume,marketCap:mkt.market_cap,ath:mkt.ath,sparkline:mkt.sparkline_in_7d?.price||[],analysis};
      // Moteurs obligatoires du copilote (confiance, contradictoire,
      // invalidation, changement) — calculés une fois ici, réutilisés
      // partout (cartes Niveau 2, onglet détaillé, synthèse globale, historique).
      d.copilot=COPILOT.analyzeCoin(coin,analysis,d,prevEntry,freshness);
      this._state[coin.id]=d;
    }
    if(Object.keys(this._state).length===0){
      throw new Error('Aucune donnée exploitable reçue.');
    }
    // Synthèse globale (Niveau 1) — pondération dynamique par rôle BTC/ETH/SOL/XRP
    this._global=COPILOT.globalSynthesis(this._state);
    this.render();
    this._histEntries=HISTORY.snapshot(this._state);
    R.historyTab(this._histEntries);
  },

  render(){
    R.ticker(this._state);
    R.overview(this._state,this._dominance,this._global);
    C.coins.forEach(c=>{const d=this._state[c.id];if(d)R.assetTab(c,d,this._state)});
    R.execSummary(this._state,this._dominance);
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('tab-'+this._currentTab).classList.add('active');
  },

  // Re-rendu sans appel API (bascule devise ou thème)
  rerender(){
    if(!Object.keys(this._state).length) return;
    R.ticker(this._state);
    R.overview(this._state,this._dominance,this._global);
    C.coins.forEach(c=>{const d=this._state[c.id];if(d)R.assetTab(c,d,this._state)});
    R.execSummary(this._state,this._dominance);
    if(this._histEntries.length) R.historyTab(this._histEntries);
    // Restaurer l'onglet courant
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    const p=document.getElementById('tab-'+this._currentTab);if(p)p.classList.add('active');
  },

  switchTab(id){
    document.querySelectorAll('.tnav-btn').forEach(b=>{
      const isActive=b.dataset.tab===id;
      b.classList.toggle('active',isActive);
      b.setAttribute('aria-selected',isActive?'true':'false');
      b.tabIndex=isActive?0:-1;
    });
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    const p=document.getElementById('tab-'+id);if(p)p.classList.add('active');
    this._currentTab=id;
    document.getElementById('content').scrollTop=0;
  },

  // Navigation clavier minimale sur les onglets : ←/→ déplace et active
  // l'onglet adjacent, Home/End va au premier/dernier (pattern ARIA tabs).
  initTabKeyboardNav(){
    const nav=document.getElementById('tab-nav');
    if(!nav)return;
    nav.addEventListener('keydown',(e)=>{
      if(!['ArrowRight','ArrowLeft','Home','End'].includes(e.key))return;
      const tabs=[...nav.querySelectorAll('.tnav-btn')];
      const curIdx=tabs.findIndex(b=>b.dataset.tab===this._currentTab);
      let nextIdx=curIdx;
      if(e.key==='ArrowRight')nextIdx=(curIdx+1)%tabs.length;
      else if(e.key==='ArrowLeft')nextIdx=(curIdx-1+tabs.length)%tabs.length;
      else if(e.key==='Home')nextIdx=0;
      else if(e.key==='End')nextIdx=tabs.length-1;
      e.preventDefault();
      const next=tabs[nextIdx];
      this.switchTab(next.dataset.tab);
      next.focus();
    });
  },

  startRefreshTimer(){
    if(this._timer)clearInterval(this._timer);
    this._countdown=C.REFRESH_MS/1000;
    this._timer=setInterval(()=>{
      this._countdown--;
      const label=this._dotState==='error'
        ?`Erreur — nouvelle tentative dans ${this._countdown}s`
        :`Prochain rafraîchissement dans ${this._countdown}s`;
      this.setStatus(null,label);
      if(this._countdown<=0){this._countdown=C.REFRESH_MS/1000;this.refresh()}
    },1000);
  },

  // Bouton MAJ : anti double-clic (debounce) + respecte le cache 60s minimum
  // (la vérification de fraîcheur a lieu dans API.fetchAll, donc un clic répété
  // sur des données encore fraîches ne déclenche aucun appel réseau).
  async refresh(){
    const now=Date.now();
    if(this._refreshing)return;
    if(now-this._lastClickTs<C.DEBOUNCE_MS)return;
    this._lastClickTs=now;
    this._refreshing=true;
    const btn=document.getElementById('refresh-btn');
    if(btn)btn.disabled=true;
    this.setStatus('loading','Vérification…');
    try{
      await this.fetchAndRender();
      this._countdown=C.REFRESH_MS/1000;
    }catch(e){
      this.handleSyncFailure(e);
    }finally{
      this._refreshing=false;
      if(btn)btn.disabled=false;
    }
  },

  handleSyncFailure(e){
    console.error('Synchronisation échouée :',e);
    const hasData=Object.keys(this._state).length>0;
    if(hasData){
      // Les anciennes données restent affichées telles quelles (aucun re-render
      // destructeur) ; on signale juste l'indisponibilité de façon discrète.
      this.setStatus('error','Données temporairement indisponibles');
      this.showSyncBanner();
    }else{
      this.setStatus('error','Erreur');
      this.showError(e);
    }
  },

  showSyncBanner(){
    const el=document.getElementById('sync-banner');if(!el)return;
    const since=this._lastSyncTs?` Dernière mise à jour affichée (${this._formatTime(this._lastSyncTs)}).`:' Dernière mise à jour affichée.';
    el.textContent='⚠ Données temporairement indisponibles.'+since;
    el.classList.add('show');
  },
  hideSyncBanner(){
    const el=document.getElementById('sync-banner');if(el)el.classList.remove('show');
  },

  setStatus(type,txt){
    const dot=document.getElementById('status-dot'),t=document.getElementById('refresh-txt'),ls=document.getElementById('last-sync-txt');
    if(type&&dot){dot.className='status-dot '+type;this._dotState=type;}
    if(t&&txt!=null)t.textContent=txt;
    if(ls)ls.textContent=this._lastSyncTs?('· Dernière synchro '+this._formatTime(this._lastSyncTs)):'';
  },

  showError(e){
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('error-screen').style.display='block';
    document.getElementById('error-msg').textContent=`Données temporairement indisponibles. Dernière mise à jour affichée : aucune pour l'instant (premier chargement).\n\nUne nouvelle tentative automatique aura lieu dans ${C.REFRESH_MS/1000}s, ou cliquez sur ↻ MAJ pour réessayer maintenant.\n\nDétail technique : ${e.message}`;
  }
};

// ── Bootstrap
window.addEventListener('DOMContentLoaded',()=>APP.init());
</script>
