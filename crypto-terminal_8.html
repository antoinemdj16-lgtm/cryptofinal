<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRYPTO TERMINAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<!-- Anti-flash : applique le thème AVANT le CSS pour éviter tout flash -->
<script>(function(){var t=localStorage.getItem('ct_theme');document.documentElement.setAttribute('data-theme',t==='light'?'light':'dark')})()</script>
<script>(function(){var m=localStorage.getItem('ct_mode_v1');document.documentElement.setAttribute('data-mode',(m==='beginner'||m==='expert')?m:'standard')})()</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06090F;--s1:#0B1018;--s2:#101620;--s3:#161E2A;--s4:#1C2535;
  --b:rgba(255,255,255,0.065);--bh:rgba(255,255,255,0.12);
  --tp:#D9E2F0;--ts:#5A6F8A;--tm:#2E3D52;
  --btc:#F7931A;--eth:#627EEA;--sol:#9945FF;--xrp:#23BAF5;
  --bear:#F43F5E;--bull:#10B981;--warn:#F59E0B;
  --bear-bg:rgba(244,63,94,.1);--bull-bg:rgba(16,185,129,.1);--warn-bg:rgba(245,158,11,.1);
  --r:8px;--r-lg:12px;--mono:'JetBrains Mono',monospace;--sans:'Space Grotesk',sans-serif;
  /* Vars dynamiques pour Chart.js (lues via getComputedStyle) */
  --chart-grid:rgba(255,255,255,0.04);--chart-tooltip-bg:#0B1018;--chart-border:rgba(255,255,255,0.1);
}

/* ══ THÈME CLAIR ══ */
[data-theme="light"]{
  --bg:#F0F4FB;--s1:#FFFFFF;--s2:#EEF1F8;--s3:#E4E8F2;--s4:#D5DDEA;
  --b:rgba(0,0,0,0.08);--bh:rgba(0,0,0,0.18);
  --tp:#0D1826;--ts:#5C7090;--tm:#8EA0B8;
  /* Couleurs sémantiques assombries pour contraste WCAG sur fond clair */
  --bear:#BE123C;--bull:#065F46;--warn:#B45309;
  --bear-bg:rgba(190,18,60,.07);--bull-bg:rgba(6,95,70,.07);--warn-bg:rgba(180,83,9,.07);
  --chart-grid:rgba(0,0,0,0.07);--chart-tooltip-bg:#FFFFFF;--chart-border:rgba(0,0,0,0.12);
}

/* Transition douce sur bascule thème (uniquement background + color) */
body{transition:background-color .25s,color .2s}
#top-bar,#tab-nav,#content,.card,.sum-card,.asset-dh,.chart-wrap,
.ind-card,.exec-card,.simple-card,.regime-verdict,.opinion-card,
.scen-card,.accumulate-box,.cc-btn,#refresh-btn,.tnav-btn,.sync-banner,
.market-view,.cop-card,.engine-card,.mv-stat,.mv-block,.mode-btn,
details.evidence>summary{
  transition:background-color .25s,border-color .25s,color .15s;
}

/* Surcharges light pour les pills hardcodées en couleur */
[data-theme="light"] .lv-res{background:rgba(190,18,60,.1);color:#BE123C}
[data-theme="light"] .lv-sup{background:rgba(6,95,70,.1);color:#065F46}
[data-theme="light"] .lv-cur{background:rgba(180,83,9,.1);color:#B45309}
[data-theme="light"] .op-vn{background:rgba(190,18,60,.1);color:#BE123C}
[data-theme="light"] .op-vp{background:rgba(6,95,70,.1);color:#065F46}
[data-theme="light"] .op-vne{background:rgba(180,83,9,.1);color:#B45309}
[data-theme="light"] .conf-pill.conf-low{background:rgba(190,18,60,.1);color:#BE123C}
[data-theme="light"] .conf-pill.conf-medium{background:rgba(180,83,9,.1);color:#B45309}
[data-theme="light"] .conf-pill.conf-high{background:rgba(6,95,70,.1);color:#065F46}

/* ══ BOUTON THÈME ══ */
#theme-btn{background:transparent;border:1px solid var(--b);color:var(--ts);width:32px;height:32px;border-radius:var(--r);font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;flex-shrink:0}
#theme-btn:hover{background:var(--s3);border-color:var(--bh);color:var(--tp)}

/* ══ SÉLECTEUR DEVISE ══ */
.fx-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0}
.fx-lbl{font-size:10px;color:var(--tm);font-family:var(--mono);letter-spacing:.04em}
.fx-btn{background:var(--s2);border:1px solid var(--b);color:var(--ts);padding:3px 9px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.06em;cursor:pointer;transition:.15s}
.fx-btn.active{background:var(--s4);border-color:var(--bh);color:var(--tp)}
.fx-btn:hover:not(.active){background:var(--s3);color:var(--tp)}
.adh-fx-note{font-size:10px;color:var(--tm);font-family:var(--mono);margin-top:3px}
html,body{height:100%;background:var(--bg);color:var(--tp);font-family:var(--sans);font-size:14px;line-height:1.5}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:var(--sans);font-size:14px}
:focus-visible{outline:2px solid var(--warn);outline-offset:2px;border-radius:4px}
.sum-card:focus-visible{outline-offset:-2px}

/* ══ APP SHELL ══ */
#app{display:grid;grid-template-rows:auto auto 1fr;height:100vh;overflow:hidden}

/* ══ TOP BAR ══ */
#top-bar{background:var(--s1);border-bottom:1px solid var(--b);padding:0 20px;display:flex;align-items:center;gap:20px;height:52px;flex-shrink:0;position:relative;z-index:10}
.logo-mark{font-size:11px;font-weight:700;letter-spacing:.18em;color:var(--ts);white-space:nowrap}
.logo-mark span{color:var(--warn)}
.ticker-strip{display:flex;gap:0;flex:1;overflow:hidden}
.tick-item{display:flex;align-items:center;gap:8px;padding:0 14px;border-right:1px solid var(--b);height:52px;white-space:nowrap}
.tick-sym{font-size:10px;font-weight:600;letter-spacing:.08em}
.tick-p{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--tp)}
.tick-c{font-family:var(--mono);font-size:11px}
.top-meta{display:flex;align-items:center;gap:14px;margin-left:auto;flex-shrink:0}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.status-dot.live{background:var(--bull);box-shadow:0 0 6px var(--bull);animation:blink 2s infinite}
.status-dot.error{background:var(--bear)}
.status-dot.loading{background:var(--warn);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.refresh-txt{font-size:11px;color:var(--ts);font-family:var(--mono)}
#refresh-btn{background:var(--s3);border:1px solid var(--b);color:var(--ts);padding:5px 12px;border-radius:var(--r);font-size:11px;font-weight:600;letter-spacing:.06em;transition:.15s}
#refresh-btn:hover{background:var(--s4);color:var(--tp)}
#refresh-btn:disabled{opacity:.5;cursor:not-allowed}

/* ══ SYNC BANNER (données indisponibles mais anciennes données conservées) ══ */
.sync-banner{display:none;background:var(--warn-bg);border-bottom:1px solid rgba(245,158,11,.25);color:#FCD34D;font-size:12px;font-weight:500;padding:8px 20px;text-align:center;flex-shrink:0}
.sync-banner.show{display:block}

/* ══ TAB NAV ══ */
#tab-nav{background:var(--s1);border-bottom:1px solid var(--b);display:flex;align-items:center;gap:2px;padding:0 20px;height:44px;flex-shrink:0;overflow-x:auto}
.tnav-btn{background:transparent;border:none;padding:0 16px;height:44px;font-size:12px;font-weight:600;color:var(--ts);letter-spacing:.04em;position:relative;white-space:nowrap;transition:color .15s}
.tnav-btn::after{content:'';position:absolute;bottom:0;left:16px;right:16px;height:2px;border-radius:2px;background:transparent;transition:.15s}
.tnav-btn:hover{color:var(--tp)}
.tnav-btn.active{color:var(--tp)}
.tnav-btn.active::after{background:var(--warn)}
.tnav-btn.btc.active::after{background:var(--btc)}
.tnav-btn.eth.active::after{background:var(--eth)}
.tnav-btn.sol.active::after{background:var(--sol)}
.tnav-btn.xrp.active::after{background:var(--xrp)}

/* ══ CONTENT AREA ══ */
#content{overflow-y:auto;padding:24px}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ══ LOADING / ERROR ══ */
#loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;color:var(--ts)}
.loading-spinner{width:32px;height:32px;border:2px solid var(--b);border-top-color:var(--warn);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;font-family:var(--mono)}
#error-screen{display:none;padding:32px;max-width:500px;margin:40px auto}
.error-card{background:var(--warn-bg);border:1px solid rgba(245,158,11,.25);border-radius:var(--r-lg);padding:24px}

/* ══ OVERVIEW GRID ══ */
.overview-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}

/* ══ ASSET SUMMARY CARD ══ */
.sum-card{background:var(--s1);border:1px solid var(--b);border-radius:var(--r-lg);padding:16px;cursor:pointer;transition:border-color .15s,transform .1s;position:relative;overflow:hidden}
.sum-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:3px 0 0 3px}
.sum-card.btc::before{background:var(--btc)}.sum-card.eth::before{background:var(--eth)}
.sum-card.sol::before{background:var(--sol)}.sum-card.xrp::before{background:var(--xrp)}
.sum-card:hover{border-color:var(--bh)}
.sc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.sc-sym{font-size:11px;font-weight:700;letter-spacing:.1em}
.sc-signal{font-size:18px;line-height:1}
.sc-price{font-family:var(--mono);font-size:18px;font-weight:600;color:var(--tp);margin-bottom:3px}
.sc-chg{font-family:var(--mono);font-size:11px;margin-bottom:12px}
.sc-score-wrap{margin-bottom:8px}
.sc-score-lbl{font-size:10px;color:var(--ts);margin-bottom:4px;display:flex;justify-content:space-between}
.sc-score-bar{height:4px;background:var(--s3);border-radius:2px;overflow:hidden}
.sc-score-fill{height:4px;border-radius:2px}
.sc-rsi{display:flex;justify-content:space-between;font-size:11px;color:var(--ts);margin-bottom:10px}
.sc-action{font-size:11px;font-weight:700;padding:4px 0;text-align:center;border-radius:var(--r);letter-spacing:.06em}

/* ══ SECTION LAYOUT ══ */
.section{margin-bottom:24px}
.sh{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--b)}
.sh-num{font-family:var(--mono);font-size:10px;color:var(--tm);background:var(--s2);padding:2px 7px;border-radius:4px;letter-spacing:.06em}
.sh-title{font-size:15px;font-weight:600;color:var(--tp)}
.sh-sub{font-size:12px;color:var(--ts);margin-left:auto}

/* ══ CARDS ══ */
.card{background:var(--s1);border:1px solid var(--b);border-radius:var(--r-lg);padding:16px}
.card-sm{padding:12px 14px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

/* ══ ASSET DETAIL HEADER ══ */
.asset-dh{display:flex;align-items:center;gap:20px;margin-bottom:20px;background:var(--s1);border:1px solid var(--b);border-radius:var(--r-lg);padding:20px}
.adh-logo{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0}
.adh-price{font-family:var(--mono);font-size:24px;font-weight:600;color:var(--tp)}
.adh-changes{display:flex;gap:14px;margin-top:4px;font-family:var(--mono);font-size:12px}
.adh-changes span{color:var(--ts)}
.adh-meta{margin-left:auto;text-align:right}
.adh-regime{font-size:20px;margin-bottom:4px}
.adh-regime-txt{font-size:12px;color:var(--ts)}

/* ══ CHART ══ */
.chart-wrap{position:relative;background:var(--s1);border:1px solid var(--b);border-radius:var(--r-lg);padding:16px;margin-bottom:12px}
.chart-controls{display:flex;gap:4px;margin-bottom:12px}
.cc-btn{background:var(--s2);border:1px solid var(--b);color:var(--ts);padding:4px 12px;border-radius:6px;font-size:11px;font-weight:600;transition:.15s}
.cc-btn.active{background:var(--s3);border-color:var(--bh);color:var(--tp)}
.chart-canvas{width:100%!important;height:220px!important}

/* ══ INDICATOR CARDS ══ */
.ind-card{background:var(--s1);border:1px solid var(--b);border-radius:var(--r-lg);padding:14px}
.ind-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--tm);margin-bottom:8px}
.ind-val{font-family:var(--mono);font-size:20px;font-weight:600;margin-bottom:4px}
.ind-note{font-size:11px;color:var(--ts)}

/* ══ RSI VISUAL ══ */
.rsi-bar-wrap{height:8px;background:linear-gradient(to right,var(--bull) 0%,var(--bull) 30%,var(--warn) 30%,var(--warn) 70%,var(--bear) 70%,var(--bear) 100%);border-radius:4px;position:relative;margin:6px 0}
.rsi-cursor{position:absolute;top:-3px;width:14px;height:14px;border-radius:50%;background:var(--tp);border:2px solid var(--bg);transform:translateX(-50%)}

/* ══ EMA TABLE ══ */
.ema-table{width:100%;border-collapse:collapse}
.ema-table th,.ema-table td{padding:8px 10px;font-size:12px;border-bottom:1px solid var(--b)}
.ema-table th{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--tm);text-align:left}
.ema-table td.mono{font-family:var(--mono);font-weight:500}
.ema-row-bull td:first-child{border-left:2px solid var(--bull)}
.ema-row-bear td:first-child{border-left:2px solid var(--bear)}

/* ══ LEVELS ══ */
.level-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--b);font-size:12px}
.level-row:last-child{border-bottom:none}
.lv-pill{font-size:10px;font-weight:600;padding:3px 9px;border-radius:4px;white-space:nowrap;min-width:90px;text-align:center}
.lv-res{background:rgba(244,63,94,.12);color:#FDA4AF}
.lv-sup{background:rgba(16,185,129,.12);color:#6EE7B7}
.lv-cur{background:rgba(245,158,11,.12);color:#FCD34D}
.lv-price{font-family:var(--mono);font-weight:600;color:var(--tp);min-width:110px}
.lv-note{color:var(--ts);flex:1}
.lv-status{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--s3);color:var(--tm);white-space:nowrap}
.lv-status.broken{background:rgba(244,63,94,.1);color:#FDA4AF}
.lv-status.tested{background:rgba(245,158,11,.1);color:#FCD34D}

/* ══ REGIME CARD ══ */
.regime-verdict{display:flex;align-items:center;gap:12px;padding:16px;background:var(--s2);border-radius:var(--r);margin-bottom:14px}
.rv-emoji{font-size:28px;line-height:1}
.rv-main{font-size:15px;font-weight:700}
.rv-sub{font-size:12px;color:var(--ts);margin-top:2px}
.rv-conf{margin-left:auto;text-align:right}
.rv-conf-val{font-family:var(--mono);font-size:18px;font-weight:600}
.rv-conf-lbl{font-size:10px;color:var(--ts)}
.signal-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px}
.sig-item{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--ts);padding:6px;border-radius:6px;background:var(--s2)}
.sig-ic{font-size:13px;flex-shrink:0;margin-top:1px}

/* ══ OPINION CARD ══ */
.opinion-card{background:var(--s1);border:1px solid var(--b);border-radius:var(--r-lg);padding:18px}
.op-verdict-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--b)}
.op-verdict-badge{font-size:11px;font-weight:700;padding:5px 14px;border-radius:var(--r);letter-spacing:.08em;text-transform:uppercase}
.op-vn{background:var(--bear-bg);color:#FDA4AF}
.op-vp{background:var(--bull-bg);color:#6EE7B7}
.op-vne{background:var(--warn-bg);color:#FCD34D}
.op-strengths{margin-bottom:12px}
.op-weaknesses{margin-bottom:14px}
.op-heading{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ts);margin-bottom:8px}
.op-point{display:flex;align-items:flex-start;gap:7px;font-size:12px;color:var(--ts);padding:4px 0;line-height:1.5}
.op-point-ic{flex-shrink:0;font-size:14px;margin-top:1px}
.accumulate-box{background:var(--s2);border-radius:var(--r);padding:12px 14px}
.acc-q{font-size:12px;color:var(--ts);margin-bottom:4px;font-style:italic}
.acc-a{font-size:14px;font-weight:600;color:var(--tp)}

/* ══ SCENARIOS ══ */
.scen-layout{display:grid;grid-template-columns:180px 1fr;gap:16px;align-items:start}
.scen-chart-wrap{height:180px;position:relative}
.scen-legend{display:flex;flex-direction:column;gap:5px;margin-top:10px;font-size:11px}
.scen-leg{display:flex;align-items:center;gap:6px;color:var(--ts)}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.scen-items{display:flex;flex-direction:column;gap:8px}
.scen-card{background:var(--s2);border-radius:var(--r);padding:12px 14px;border-left:3px solid transparent}
.scen-card.bear{border-left-color:var(--bear)}.scen-card.neu{border-left-color:var(--warn)}.scen-card.bull{border-left-color:var(--bull)}
.scen-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.scen-name{font-size:12px;font-weight:600}
.scen-pct{font-family:var(--mono);font-size:14px;font-weight:700}
.scen-bar-bg{height:3px;background:var(--s3);border-radius:2px;margin-bottom:6px}
.scen-bar-f{height:3px;border-radius:2px}
.scen-desc{font-size:11px;color:var(--ts);line-height:1.5;margin-bottom:5px}
.scen-triggers{font-size:10px;color:var(--tm)}
.scen-triggers strong{color:var(--ts)}

/* ══ SCORE ══ */
.score-big-wrap{text-align:center;padding:16px}
.score-big{font-family:var(--mono);font-size:52px;font-weight:700;line-height:1;margin-bottom:4px}
.score-human{font-size:14px;font-weight:600;margin-bottom:10px}
.daily-verdict{background:var(--s1);border:1px solid var(--b);border-radius:var(--r-lg);padding:14px 18px;font-size:15px;font-weight:600;color:var(--tp);display:flex;align-items:center;gap:10px}
.daily-verdict .dv-icon{font-size:18px;flex-shrink:0}
.interp-line{font-size:13px;color:var(--tp);background:var(--s2);border-radius:var(--r);padding:10px 12px;margin-bottom:12px;line-height:1.5}
.score-disclaimer{font-size:11px;color:var(--ts);margin-top:10px;line-height:1.5;font-style:italic}
.score-gauge{height:8px;border-radius:4px;background:linear-gradient(to right,var(--bear) 0%,var(--warn) 40%,var(--bull) 70%,#6EE7B7 100%);position:relative;margin:0 auto 8px;max-width:200px}
.score-needle{position:absolute;top:-4px;width:16px;height:16px;border-radius:50%;background:var(--tp);border:2px solid var(--bg);transform:translateX(-50%)}
.score-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--tm);max-width:200px;margin:0 auto}

/* ══ SIMPLE SUMMARY ══ */
.simple-card{background:var(--s2);border-radius:var(--r);padding:16px;margin-bottom:10px}
.simple-q{font-size:11px;font-weight:600;color:var(--ts);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.simple-a{font-size:13px;color:var(--tp);line-height:1.6}
.action-banner{text-align:center;padding:16px;border-radius:var(--r-lg);margin:14px 0;border:1px solid}
.ab-pre{font-size:11px;font-weight:600;letter-spacing:.12em;color:var(--ts);margin-bottom:6px}
.ab-action{font-size:22px;font-weight:700}
.ab-expl{font-size:12px;color:var(--ts);margin-top:6px}
.action-buy{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.25)}
.action-buy .ab-action{color:var(--bull)}
.action-dca{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.25)}
.action-dca .ab-action{color:var(--warn)}
.action-wait{background:var(--s2);border-color:var(--b)}
.action-wait .ab-action{color:var(--ts)}
.action-avoid{background:rgba(244,63,94,.08);border-color:rgba(244,63,94,.25)}
.action-avoid .ab-action{color:var(--bear)}
.risk-horizon{display:flex;justify-content:center;gap:20px;font-size:12px}
.rh-item{display:flex;align-items:center;gap:6px}
.rh-label{color:var(--ts)}
.rh-val{font-weight:600}

/* ══ EXECUTIVE SUMMARY ══ */
.exec-card{background:var(--s1);border:1px solid var(--b);border-radius:var(--r-lg);padding:20px;margin-bottom:12px}
.exec-verdict{font-size:20px;font-weight:700;color:var(--tp);margin-bottom:6px}
.exec-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--b);font-size:13px}
.exec-row:last-child{border-bottom:none}
.exec-lbl{color:var(--ts)}
.exec-val{font-weight:600;color:var(--tp)}
.exec-action{text-align:center;padding:20px;background:var(--s2);border-radius:var(--r);margin:16px 0}
.exec-action-label{font-size:11px;font-weight:600;letter-spacing:.12em;color:var(--ts);margin-bottom:8px}
.exec-action-val{font-size:28px;font-weight:700;margin-bottom:8px}
.exec-one{font-style:italic;font-size:14px;color:var(--ts);line-height:1.5;max-width:500px;margin:0 auto}

/* ══ HISTORY MINI ══ */
.hist-table{width:100%;border-collapse:collapse}
.hist-table th,.hist-table td{padding:7px 10px;font-size:11px;border-bottom:1px solid var(--b);text-align:left}
.hist-table th{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--tm)}
.hist-table td.mono{font-family:var(--mono)}

/* ══ MISC ══ */
.tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;background:var(--s3);color:var(--ts)}
.neg{color:var(--bear)}.pos{color:var(--bull)}.neu{color:var(--warn)}
.muted{color:var(--ts)}
.fw6{font-weight:600}
.mb8{margin-bottom:8px}
.mt8{margin-top:8px}
.sep{color:var(--tm);padding:0 4px}
.num{font-family:var(--mono)}
.row-center{display:flex;align-items:center;gap:8px}
.ml-auto{margin-left:auto}
.text-right{text-align:right}

/* ══ NIVEAU 1 — VUE MARCHÉ (copilote) ══ */
.market-view{background:var(--s1);border:1px solid var(--b);border-radius:var(--r-lg);padding:22px;margin-bottom:20px}
.mv-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.mv-state-wrap{display:flex;align-items:center;gap:12px}
.mv-state-emoji{font-size:34px;line-height:1}
.mv-state-eyebrow{font-size:10px;font-weight:600;color:var(--ts);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.mv-state-name{font-size:23px;font-weight:700;color:var(--tp)}
.mv-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.mv-stat{background:var(--s2);border-radius:var(--r);padding:11px 12px;text-align:center}
.mv-stat-lbl{font-size:10px;color:var(--ts);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.mv-stat-val{font-family:var(--mono);font-size:19px;font-weight:700;line-height:1}
.mv-stat-sub{font-size:10px;color:var(--tm);margin-top:3px}
.mv-grid-bottom{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mv-block{background:var(--s2);border-radius:var(--r);padding:14px 16px}
.mv-block-title{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ts);margin-bottom:8px}
.mv-inaction-badge{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:.06em;padding:3px 9px;border-radius:4px;background:var(--s3);color:var(--ts);margin-bottom:8px;text-transform:uppercase}
.mv-action-item{display:flex;gap:8px;font-size:13px;color:var(--tp);padding:2px 0;line-height:1.55}
.mv-action-arrow{color:var(--warn);flex-shrink:0}
.mv-why{font-size:12px;color:var(--ts);margin-top:8px;line-height:1.5}
.mv-change-text{font-size:13px;color:var(--tp);line-height:1.6}

/* ══ SÉLECTEUR DE MODE (pédagogie) ══ */
.mode-wrap{display:flex;align-items:center;gap:3px;background:var(--s2);border-radius:var(--r);padding:3px;flex-shrink:0}
.mode-btn{background:transparent;border:none;color:var(--ts);padding:6px 10px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:.01em;transition:.15s;white-space:nowrap}
.mode-btn.active{background:var(--s4);color:var(--tp)}
.mode-btn:hover:not(.active){color:var(--tp)}

/* ══ PASTILLE DE CONFIANCE (réutilisée partout) ══ */
.conf-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:var(--r);white-space:nowrap}
.conf-pill.conf-low{background:var(--bear-bg);color:#FDA4AF}
.conf-pill.conf-medium{background:var(--warn-bg);color:#FCD34D}
.conf-pill.conf-high{background:var(--bull-bg);color:#6EE7B7}

/* ══ NIVEAU 2 — CARTES COPILOTE PAR ACTIF ══ */
.cop-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.cop-card{background:var(--s1);border:1px solid var(--b);border-radius:var(--r-lg);padding:16px;position:relative;overflow:hidden;cursor:pointer;transition:border-color .15s}
.cop-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%}
.cop-card.btc::before{background:var(--btc)}.cop-card.eth::before{background:var(--eth)}
.cop-card.sol::before{background:var(--sol)}.cop-card.xrp::before{background:var(--xrp)}
.cop-card:hover{border-color:var(--bh)}
.cop-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:2px}
.cop-sym{font-size:13px;font-weight:700;letter-spacing:.05em}
.cop-role{font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--tm);margin-top:2px}
.cop-price-wrap{text-align:right;flex-shrink:0}
.cop-price{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--tp)}
.cop-chg{font-family:var(--mono);font-size:11px}
.cop-summary{font-size:13px;color:var(--tp);line-height:1.55;margin:10px 0}
.cop-rows{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.cop-row{display:flex;align-items:flex-start;gap:7px;font-size:11.5px;color:var(--ts);line-height:1.45}
.cop-row-ic{flex-shrink:0;font-size:11px;margin-top:2px}
.cop-row b{color:var(--tp);font-weight:600}
.cop-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--b)}
.cop-chip{font-size:10px;font-weight:700;padding:3px 9px;border-radius:4px;letter-spacing:.03em}
.cop-link{font-size:11px;color:var(--ts);font-weight:600;flex-shrink:0}
.cop-card:hover .cop-link{color:var(--tp)}

/* ══ MOTEURS OBLIGATOIRES (onglet détaillé par actif) ══ */
.engine-card{background:var(--s1);border:1px solid var(--b);border-radius:var(--r-lg);padding:18px}
.engine-q{font-size:13px;font-weight:600;color:var(--tp);margin-bottom:14px;font-style:italic}
.contra-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.contra-col-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.contra-col-title.pos{color:var(--bull)}.contra-col-title.neg{color:var(--bear)}
.contra-item{display:flex;align-items:flex-start;gap:7px;font-size:12px;color:var(--ts);padding:4px 0;line-height:1.5}
.contra-conclusion{background:var(--s2);border-radius:var(--r);padding:12px 14px;font-size:13px;color:var(--tp);font-weight:500}
.invalid-list{display:flex;flex-direction:column;gap:8px}
.invalid-item{display:flex;align-items:flex-start;gap:8px;font-size:12.5px;color:var(--ts);line-height:1.5;padding:9px 10px;background:var(--s2);border-radius:var(--r)}
.invalid-ic{flex-shrink:0;color:var(--warn)}
.change-text{font-size:13px;color:var(--tp);line-height:1.6}
.conf-breakdown{margin-top:14px;padding-top:14px;border-top:1px solid var(--b)}
.conf-factor-row{display:flex;justify-content:space-between;font-size:11.5px;color:var(--ts);padding:4px 0}
.conf-factor-row b{color:var(--tp);font-family:var(--mono)}

/* ══ PREUVES REPLIABLES (Niveau 3) ══ */
details.evidence{margin-top:4px}
details.evidence>summary{cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px;padding:13px 16px;background:var(--s2);border-radius:var(--r-lg);font-size:12px;font-weight:600;color:var(--ts);letter-spacing:.02em;user-select:none}
details.evidence>summary::-webkit-details-marker{display:none}
details.evidence>summary::before{content:'▸';color:var(--tm);transition:transform .15s;display:inline-block}
details.evidence[open]>summary::before{transform:rotate(90deg)}
details.evidence>summary:hover{color:var(--tp)}
details.evidence>summary:hover::before{color:var(--ts)}
.evidence-body{padding-top:16px}

/* ══ RÔLE DE L'ACTIF (en-tête onglet détaillé) ══ */
.role-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--ts);background:var(--s2);padding:4px 10px;border-radius:var(--r);margin-top:8px}
.role-tag b{color:var(--tp);font-weight:600}

/* ══ MODES PÉDAGOGIQUES — même moteur, affichage différent ══ */
/* Débutant : on masque le jargon et les preuves détaillées, on garde le résumé */
[data-mode="beginner"] details.evidence{display:none}
[data-mode="beginner"] .role-tag{display:none}
/* Expert : informations supplémentaires (composition détaillée de la confiance) */
.exp-only{display:none}
[data-mode="expert"] .exp-only{display:block}

/* ══ RESPONSIVE ══ */
@media(max-width:900px){
  .overview-grid,.grid-4{grid-template-columns:1fr 1fr}
  .scen-layout{grid-template-columns:1fr}
  .ticker-strip .tick-item:nth-child(n+3){display:none}
  .cop-grid{grid-template-columns:1fr}
}
@media(max-width:600px){
  .overview-grid,.grid-4,.grid-3,.grid-2{grid-template-columns:1fr}
  .signal-grid{grid-template-columns:1fr}
  .mv-stats,.mv-grid-bottom,.contra-grid{grid-template-columns:1fr}
  .mode-btn{padding:6px 8px;font-size:10px}
}
</style>
</head>
<body>
<div id="app">
  <header id="top-bar">
    <div class="logo-mark">CRYPTO<span>TERMINAL</span></div>
    <div class="ticker-strip" id="ticker-strip"></div>
    <div class="top-meta">
      <div class="status-dot loading" id="status-dot" role="status" aria-label="Statut de synchronisation"></div>
      <span class="refresh-txt" id="refresh-txt" aria-live="polite">Chargement…</span>
      <span class="refresh-txt" id="last-sync-txt"></span>
      <!-- Sélecteur devise -->
      <div class="fx-wrap" role="group" aria-label="Sélection de devise">
        <span class="fx-lbl">🌍</span>
        <button class="fx-btn" data-cur="EUR" onclick="FX.toggle('EUR')" aria-label="Afficher en euros">EUR</button>
        <button class="fx-btn active" data-cur="USD" onclick="FX.toggle('USD')" aria-label="Afficher en dollars">USD</button>
      </div>
      <!-- Bascule thème -->
      <button id="theme-btn" onclick="THEME.toggle()" aria-label="Basculer le thème clair/sombre" title="Thème clair / sombre">🌙</button>
      <button id="refresh-btn" onclick="APP.refresh()">↻ MAJ</button>
    </div>
  </header>

  <nav id="tab-nav" role="tablist" aria-label="Navigation des sections">
    <button class="tnav-btn active" data-tab="overview" role="tab" aria-selected="true" aria-controls="tab-overview" id="tabbtn-overview" tabindex="0" onclick="APP.switchTab('overview')">Vue d'ensemble</button>
    <button class="tnav-btn btc" data-tab="btc" role="tab" aria-selected="false" aria-controls="tab-btc" id="tabbtn-btc" tabindex="-1" onclick="APP.switchTab('btc')">₿ Bitcoin</button>
    <button class="tnav-btn eth" data-tab="eth" role="tab" aria-selected="false" aria-controls="tab-eth" id="tabbtn-eth" tabindex="-1" onclick="APP.switchTab('eth')">Ξ Ethereum</button>
    <button class="tnav-btn sol" data-tab="sol" role="tab" aria-selected="false" aria-controls="tab-sol" id="tabbtn-sol" tabindex="-1" onclick="APP.switchTab('sol')">◎ Solana</button>
    <button class="tnav-btn xrp" data-tab="xrp" role="tab" aria-selected="false" aria-controls="tab-xrp" id="tabbtn-xrp" tabindex="-1" onclick="APP.switchTab('xrp')">✕ XRP</button>
    <button class="tnav-btn" data-tab="exec" role="tab" aria-selected="false" aria-controls="tab-exec" id="tabbtn-exec" tabindex="-1" onclick="APP.switchTab('exec')">Résumé exécutif</button>
    <button class="tnav-btn" data-tab="history" role="tab" aria-selected="false" aria-controls="tab-history" id="tabbtn-history" tabindex="-1" onclick="APP.switchTab('history')">Historique</button>
  </nav>

  <div id="sync-banner" class="sync-banner" role="status" aria-live="polite"></div>

  <main id="content">
    <div id="loading-screen">
      <div class="loading-spinner"></div>
      <div class="loading-txt">Récupération des données marché…</div>
    </div>
    <div id="error-screen">
      <div class="error-card">
        <div style="font-size:18px;font-weight:700;color:var(--warn);margin-bottom:8px">Données temporairement indisponibles</div>
        <div id="error-msg" style="font-size:13px;color:var(--ts);line-height:1.6"></div>
      </div>
    </div>
    <div id="tab-overview" class="tab-panel" role="tabpanel" aria-labelledby="tabbtn-overview" tabindex="0"></div>
    <div id="tab-btc" class="tab-panel" role="tabpanel" aria-labelledby="tabbtn-btc" tabindex="0"></div>
    <div id="tab-eth" class="tab-panel" role="tabpanel" aria-labelledby="tabbtn-eth" tabindex="0"></div>
    <div id="tab-sol" class="tab-panel" role="tabpanel" aria-labelledby="tabbtn-sol" tabindex="0"></div>
    <div id="tab-xrp" class="tab-panel" role="tabpanel" aria-labelledby="tabbtn-xrp" tabindex="0"></div>
    <div id="tab-exec" class="tab-panel" role="tabpanel" aria-labelledby="tabbtn-exec" tabindex="0"></div>
    <div id="tab-history" class="tab-panel" role="tabpanel" aria-labelledby="tabbtn-history" tabindex="0"></div>
  </main>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════
//  THEME — Mode Jour / Nuit
// ═══════════════════════════════════════════════════
const THEME = {
  _KEY: 'ct_theme',

  // Appelé après DOMContentLoaded — le data-theme est déjà appliqué par le
  // script anti-flash en tête de page. On se contente d'initialiser le bouton
  // et de détecter la préférence système si aucun choix n'est mémorisé.
  init(){
    if(!localStorage.getItem(this._KEY)){
      // Premier lancement : suivre la préférence système
      const preferLight=window.matchMedia('(prefers-color-scheme: light)').matches;
      this._apply(preferLight?'light':'dark');
    }
    this._updateBtn();
    // Écouter les changements système (ex. passage auto nuit/jour de l'OS)
    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change',e=>{
      if(!localStorage.getItem(this._KEY)) this._apply(e.matches?'light':'dark');
    });
  },

  current(){return document.documentElement.getAttribute('data-theme')||'dark'},

  toggle(){
    const next=this.current()==='dark'?'light':'dark';
    this._apply(next);
    // CSS vars changent instantanément → uniquement rechargement des charts
    // de l'onglet visible (Chart.js est canvas-based, insensible aux CSS vars)
    const tab=APP._currentTab;
    if(['btc','eth','sol','xrp'].includes(tab)){
      const coin=C.coins.find(c=>c.cls===tab);
      const d=APP._state[coin?.id];
      if(coin&&d) R.assetTab(coin,d,APP._state);
    }
  },

  _apply(theme){
    document.documentElement.setAttribute('data-theme',theme);
    localStorage.setItem(this._KEY,theme);
    this._updateBtn();
  },

  _updateBtn(){
    const btn=document.getElementById('theme-btn');
    if(btn) btn.textContent=this.current()==='dark'?'☀️':'🌙';
    if(btn) btn.setAttribute('aria-label',this.current()==='dark'?'Passer en mode clair':'Passer en mode sombre');
  }
};

// ═══════════════════════════════════════════════════
//  MODE — Pédagogie (Débutant / Standard / Expert)
//  Même moteur d'analyse (COPILOT) pour les 3 modes — seul l'affichage
//  change : quantité de jargon, niveau de détail, ouverture par défaut des
//  preuves repliables. Persisté en localStorage, comme le thème.
// ═══════════════════════════════════════════════════
const MODE = {
  _KEY:'ct_mode_v1',
  VALID:['beginner','standard','expert'],

  current(){
    const m=document.documentElement.getAttribute('data-mode');
    return this.VALID.includes(m)?m:'standard';
  },

  init(){
    this._updateBtns();
  },

  set(mode){
    if(!this.VALID.includes(mode))return;
    document.documentElement.setAttribute('data-mode',mode);
    try{localStorage.setItem(this._KEY,mode)}catch{}
    // Le contenu textuel (pas seulement le CSS) dépend du mode → re-rendu
    // complet ; les boutons reflètent l'état actif via le template lui-même.
    if(Object.keys(APP._state).length) APP.rerender();
    else this._updateBtns();
  },

  _updateBtns(){
    const cur=this.current();
    document.querySelectorAll('.mode-btn').forEach(b=>{
      b.classList.toggle('active',b.dataset.mode===cur);
    });
  }
};

// ═══════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════
const C = {
  coins:[
    {id:'bitcoin',   sym:'BTC', name:'Bitcoin',  cls:'btc', color:'#F7931A', short:'₿', hasOpinion:false, paprikaId:'btc-bitcoin',
      role:'Régime du marché', roleQ:'Le marché est-il sain ?', wRange:[30,60]},
    {id:'ethereum',  sym:'ETH', name:'Ethereum', cls:'eth', color:'#627EEA', short:'Ξ', hasOpinion:true, paprikaId:'eth-ethereum',
      role:'Qualité du capital', roleQ:'Les flux semblent-ils sérieux ?', wRange:[10,35]},
    {id:'solana',    sym:'SOL', name:'Solana',   cls:'sol', color:'#9945FF', short:'◎', hasOpinion:true, paprikaId:'sol-solana',
      role:'Accélération', roleQ:'Y a-t-il une recherche de rendement ?', wRange:[5,25]},
    {id:'ripple',    sym:'XRP', name:'XRP',      cls:'xrp', color:'#23BAF5', short:'✕', hasOpinion:true, paprikaId:'xrp-xrp',
      role:'Rotation', roleQ:'Y a-t-il un mouvement inhabituel ?', wRange:[0,15]}
  ],
  REFRESH_MS:    300000,
  MIN_CACHE_MS:  60000,            // cache : 60s minimum avant tout nouvel appel réseau
  DEBOUNCE_MS:   2500,             // anti double-clic sur le bouton MAJ
  RETRY_DELAYS:  [2000,5000],      // tentative1 → attendre 2s → tentative2 → attendre 5s → tentative3
  CACHE_KEY:     'ct_cache_v3',
  HISTORY_KEY:   'ct_hist_v3',
  STATUS_KEY:    'ct_status_v1',
  MAX_HIST_DAYS: 90,
  API_BASE:      'https://api.coingecko.com/api/v3',
  FALLBACK_BASE: 'https://api.coinpaprika.com/v1'
};

function sleep(ms){return new Promise(res=>setTimeout(res,ms))}

// Retry générique : tentative 1 (immédiate) → échec → attendre 2s → tentative 2
// → échec → attendre 5s → tentative 3 → échec → on relance l'erreur (le caller
// gère alors le repli vers la source de secours / le cache).
async function withRetry(fn){
  let lastErr;
  for(let i=0;i<=C.RETRY_DELAYS.length;i++){
    try{ return await fn(i+1); }
    catch(e){
      lastErr=e;
      if(i<C.RETRY_DELAYS.length) await sleep(C.RETRY_DELAYS[i]);
    }
  }
  throw lastErr;
}

// ═══════════════════════════════════════════════════
//  FORMATTERS
// ═══════════════════════════════════════════════════
const FMT = {
  // Les fonctions price() et vol() délèguent à FX.convert() — toute la logique
  // de conversion est dans FX. USD reste la valeur stockée, la conversion
  // n'a lieu qu'à l'affichage.
  price(v){
    if(!v&&v!==0)return'N/A';
    const c=FX.convert(v), s=FX.symbol;
    if(v>=1000)return s+c.toLocaleString('fr-FR',{maximumFractionDigits:0});
    if(v>=1)return s+c.toFixed(3);
    return s+c.toFixed(5);
  },
  pct(v){if(v==null)return'N/A';const s=v>=0?'+':'';return s+v.toFixed(2)+'%'},
  vol(v){
    if(!v)return'N/A';
    const c=FX.convert(v), s=FX.symbol;
    if(v>=1e9)return s+(c/1e9).toFixed(2)+'Mrd';
    if(v>=1e6)return s+(c/1e6).toFixed(0)+'M';
    return s+c.toFixed(0);
  },
  num(v,d=2){if(v==null)return'N/A';return typeof v==='number'?v.toFixed(d):'N/A'},
  date(ts){const d=new Date(ts);return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})},
  timeAgo(ts){const m=Math.round((Date.now()-ts)/60000);if(m<1)return'à l\'instant';if(m<60)return`${m}min`;return`${Math.round(m/60)}h`}
};

// ═══════════════════════════════════════════════════
//  FX — Conversion EUR / USD
//  Architecture : USD = source de vérité. Conversion uniquement au moment
//  du rendu via FX.convert(). FMT.price() et FMT.vol() délèguent à FX.
// ═══════════════════════════════════════════════════
const FX = {
  _rate:      0.92,      // EUR par USD (fallback prudent)
  _currency:  'USD',
  _lastFetch: 0,
  _KEY_RATE:  'ct_fx_rate_v1',
  _KEY_CUR:   'ct_fx_cur_v1',
  _TTL:       3600000,   // 1h en ms

  get symbol(){ return this._currency==='EUR'?'€':'$' },
  get isEur(){  return this._currency==='EUR' },

  // Convertit une valeur USD → devise courante (no-op si USD)
  convert(usd){
    if(usd==null||usd===undefined) return usd;
    return this.isEur ? usd*this._rate : usd;
  },

  // Minutes depuis le dernier fetch réussi (pour note UI)
  minutesAgo(){
    if(!this._lastFetch) return null;
    const m=Math.round((Date.now()-this._lastFetch)/60000);
    return m<1?'<1':String(m);
  },

  // ── Fetch du taux EUR/USD via API publique gratuite (sans clé) ──
  async fetchRate(){
    try{
      const r=await fetch('https://open.er-api.com/v6/latest/USD',{signal:AbortSignal.timeout?AbortSignal.timeout(8000):undefined});
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      const json=await r.json();
      const rate=json?.rates?.EUR;
      if(!rate||typeof rate!=='number') throw new Error('Taux EUR absent de la réponse');
      this._rate=rate;
      this._lastFetch=Date.now();
      try{localStorage.setItem(this._KEY_RATE,JSON.stringify({rate,ts:this._lastFetch}))}catch{}
      console.log(`FX: taux EUR/USD mis à jour → ${rate.toFixed(4)}`);
    }catch(e){
      console.warn('FX.fetchRate échec (fallback sur cache ou 0.92) :',e.message);
      // Repli 1 : dernier taux connu en cache
      try{
        const c=JSON.parse(localStorage.getItem(this._KEY_RATE));
        if(c?.rate&&typeof c.rate==='number'){
          this._rate=c.rate;
          this._lastFetch=c.ts||0;
          console.warn(`FX: fallback taux cache ${c.rate.toFixed(4)} (${new Date(c.ts).toLocaleTimeString()})`);
          return;
        }
      }catch{}
      // Repli 2 : valeur par défaut (0.92) — déjà définie dans _rate
    }
  },

  // ── Initialisation (appelée dans APP.init) ──
  async init(){
    // Charger préférence devise
    this._currency=localStorage.getItem(this._KEY_CUR)||'USD';
    // Charger taux mis en cache
    try{
      const c=JSON.parse(localStorage.getItem(this._KEY_RATE));
      if(c?.rate&&typeof c.rate==='number'){this._rate=c.rate;this._lastFetch=c.ts||0}
    }catch{}
    // Fetch frais si mode EUR et cache périmé (> 1h)
    if(this.isEur&&Date.now()-this._lastFetch>this._TTL){
      await this.fetchRate();
    }
    this._updateUI();
  },

  // ── Bascule devise (appelée par les boutons) ──
  async toggle(cur){
    if(this._currency===cur) return;
    this._currency=cur;
    localStorage.setItem(this._KEY_CUR,cur);
    // Si passage en EUR avec cache périmé → fetch avant re-rendu
    if(this.isEur&&Date.now()-this._lastFetch>this._TTL){
      await this.fetchRate();
    }
    this._updateUI();
    if(Object.keys(APP._state).length) APP.rerender();
  },

  _updateUI(){
    document.querySelectorAll('.fx-btn').forEach(b=>{
      b.classList.toggle('active',b.dataset.cur===this._currency);
    });
  }
};

//  HISTORY (localStorage)
// ═══════════════════════════════════════════════════
const HISTORY = {
  load(){try{return JSON.parse(localStorage.getItem(C.HISTORY_KEY))||[]}catch{return[]}},
  save(entries){try{localStorage.setItem(C.HISTORY_KEY,JSON.stringify(entries))}catch(e){console.warn('HISTORY.save a échoué (quota/stockage indisponible) :',e)}},
  snapshot(state){
    const entries=this.load();
    const today=new Date().toISOString().slice(0,10);
    // Remove today if already exists
    const filtered=entries.filter(e=>e.date!==today);
    const snap={date:today,ts:Date.now(),coins:{}};
    C.coins.forEach(coin=>{
      const d=state[coin.id];if(!d)return;
      const cp=d.copilot,ts=cp?.todaySnap;
      snap.coins[coin.sym]={
        price:d.price,rsi:d.analysis?.rsi,score:d.analysis?.score,regime:d.analysis?.regime?.trend,action:d.analysis?.action,
        // Champs additionnels pour le moteur de changement (comparaison au
        // prochain chargement) — absents sur les anciens historiques, lus
        // avec garde-fous côté COPILOT.change().
        confidence:ts?.confidence,rsiBucket:ts?.rsiBucket,macdBullish:ts?.macdBullish,structure:ts?.structure
      };
    });
    filtered.push(snap);
    // Keep max days
    if(filtered.length>C.MAX_HIST_DAYS)filtered.splice(0,filtered.length-C.MAX_HIST_DAYS);
    this.save(filtered);
    return filtered;
  },
  // Dernière entrée antérieure à aujourd'hui (= "hier" au sens du moteur de
  // changement — en pratique la dernière session différente d'aujourd'hui).
  previous(entries){
    if(!entries||!entries.length)return null;
    const today=new Date().toISOString().slice(0,10);
    const past=entries.filter(e=>e.date!==today).sort((a,b)=>b.ts-a.ts);
    return past[0]||null;
  },
  // Cache brut, indépendant de tout TTL : permet de toujours retrouver les
  // dernières données connues, même très anciennes, pour ne jamais laisser
  // le tableau de bord vide en cas de panne API prolongée.
  getCacheRaw(){try{const c=localStorage.getItem(C.CACHE_KEY);return c?JSON.parse(c):null}catch{return null}},
  // true si un cache existe et a moins de maxAgeMs
  isFresh(maxAgeMs){const c=this.getCacheRaw();return!!c&&(Date.now()-c.ts<maxAgeMs)},
  // Cache filtré par âge ; maxAgeMs=null/undefined → ignore le TTL (cache "de secours")
  getCached(maxAgeMs){const c=this.getCacheRaw();if(!c)return null;if(maxAgeMs!=null&&Date.now()-c.ts>maxAgeMs)return null;return c},
  setCache(data){try{localStorage.setItem(C.CACHE_KEY,JSON.stringify({ts:Date.now(),data}))}catch(e){console.warn('HISTORY.setCache a échoué (quota/stockage indisponible) :',e)}}
};

//  API
// ═══════════════════════════════════════════════════
const API = {
  async get(path){
    const r=await fetch(C.API_BASE+path,{headers:{'Accept':'application/json'}});
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    return r.json();
  },
  async getPaprika(path){
    const r=await fetch(C.FALLBACK_BASE+path,{headers:{'Accept':'application/json'}});
    if(!r.ok)throw new Error(`Paprika HTTP ${r.status}`);
    return r.json();
  },
  async markets(){
    return this.get('/coins/markets?vs_currency=usd&ids=bitcoin,ethereum,solana,ripple&sparkline=true&price_change_percentage=7d,30d&order=market_cap_desc&per_page=4');
  },
  async history(id,days=200){
    return this.get(`/coins/${id}/market_chart?vs_currency=usd&days=${days}&interval=daily`);
  },
  async global(){
    return this.get('/global');
  },

  // ── Source primaire : CoinGecko, avec retry intégré (1+2 relances) ──
  async fetchAllCoinGecko(){
    return withRetry(async()=>{
      const [markets,globalData,...histories]=await Promise.all([
        this.markets(),
        this.global(),
        ...C.coins.map(c=>this.history(c.id))
      ]);
      const data={markets,global:globalData,histories:{},source:'coingecko'};
      C.coins.forEach((c,i)=>{data.histories[c.id]=histories[i]});
      return data;
    });
  },

  // ── Source de secours : CoinPaprika (1 seul appel groupé pour les 4 actifs) ──
  // Ne fournit que le marché en direct (prix, %, volume, dominance) ; l'historique
  // nécessaire aux indicateurs techniques est repris du dernier jeu de données
  // CoinGecko connu, pour continuer à afficher RSI/MACD/EMA/structure cohérents.
  async fetchAllPaprika(lastHistories){
    const [tickers,globalData]=await Promise.all([
      this.getPaprika('/tickers?quotes=USD'),
      this.getPaprika('/global')
    ]);
    const markets=C.coins.map(c=>{
      const t=Array.isArray(tickers)?tickers.find(x=>x.id===c.paprikaId):null;
      const q=t&&t.quotes&&t.quotes.USD;
      if(!q)return null;
      return{
        id:c.id,current_price:q.price,
        price_change_percentage_24h:q.percent_change_24h,
        price_change_percentage_7d_in_currency:q.percent_change_7d,
        price_change_percentage_30d_in_currency:q.percent_change_30d,
        total_volume:q.volume_24h,market_cap:q.market_cap,
        ath:q.ath_price||null,sparkline_in_7d:{price:[]}
      };
    }).filter(Boolean);
    if(!markets.length)throw new Error('CoinPaprika: aucune donnée exploitable');
    const dom=globalData&&globalData.bitcoin_dominance_percentage;
    return{markets,global:{data:{market_cap_percentage:{btc:dom}}},histories:lastHistories||{},source:'coinpaprika'};
  },

  // ── Orchestration : cache frais (≥60s) → CoinGecko (+retry) → CoinPaprika (secours) ──
  async fetchAll(){
    if(HISTORY.isFresh(C.MIN_CACHE_MS)){
      return HISTORY.getCached(C.MIN_CACHE_MS).data;
    }
    try{
      const data=await this.fetchAllCoinGecko();
      HISTORY.setCache(data);
      return data;
    }catch(primaryErr){
      const lastRaw=HISTORY.getCached(null); // n'importe quel ancien cache, ignore le TTL
      try{
        const data=await this.fetchAllPaprika(lastRaw?.data?.histories);
        HISTORY.setCache(data);
        return data;
      }catch(fallbackErr){
        const combined=new Error(`Source primaire (CoinGecko) indisponible : ${primaryErr.message}. Source de secours (CoinPaprika) également indisponible : ${fallbackErr.message}.`);
        combined.primaryErr=primaryErr;
        combined.fallbackErr=fallbackErr;
        throw combined;
      }
    }
  }
};

// ═══════════════════════════════════════════════════
//  MATH — Technical Indicators
// ═══════════════════════════════════════════════════
const MATH = {
  ema(prices,period){
    if(!prices||prices.length<period)return null;
    const k=2/(period+1);
    let e=prices.slice(0,period).reduce((a,b)=>a+b,0)/period;
    for(let i=period;i<prices.length;i++)e=prices[i]*k+e*(1-k);
    return e;
  },
  emaArr(prices,period){
    if(!prices||prices.length<period)return Array(prices?prices.length:0).fill(null);
    const k=2/(period+1),res=Array(period-1).fill(null);
    let e=prices.slice(0,period).reduce((a,b)=>a+b,0)/period;
    res.push(e);
    for(let i=period;i<prices.length;i++){e=prices[i]*k+e*(1-k);res.push(e)}
    return res;
  },
  rsi(prices,period=14){
    if(!prices||prices.length<period+2)return null;
    let g=0,l=0;
    for(let i=1;i<=period;i++){const d=prices[i]-prices[i-1];d>0?g+=d:l-=d}
    let ag=g/period,al=l/period;
    for(let i=period+1;i<prices.length;i++){
      const d=prices[i]-prices[i-1];
      ag=(ag*(period-1)+Math.max(0,d))/period;
      al=(al*(period-1)+Math.max(0,-d))/period;
    }
    if(al===0)return 100;
    return 100-100/(1+ag/al);
  },
  macd(prices){
    if(!prices||prices.length<36)return null;
    const e12=this.emaArr(prices,12),e26=this.emaArr(prices,26);
    const ml=[];
    for(let i=0;i<e12.length;i++){if(e12[i]!==null&&e26[i]!==null)ml.push(e12[i]-e26[i])}
    if(ml.length<10)return null;
    const sl=this.emaArr(ml,9);
    const macdVal=ml[ml.length-1],sigVal=sl[sl.length-1];
    const prevMacd=ml[ml.length-2],prevSig=sl[sl.length-2];
    return{
      value:macdVal,signal:sigVal,histogram:macdVal-sigVal,
      bullish:macdVal>sigVal,
      crossUp:prevMacd<=prevSig&&macdVal>sigVal,
      crossDown:prevMacd>=prevSig&&macdVal<sigVal
    };
  },
  pivots(prices,window=5){
    if(!prices||prices.length<window*2+1)return{supports:[],resistances:[]};
    const cur=prices[prices.length-1];
    const ph=[],pl=[];
    for(let i=window;i<prices.length-window;i++){
      const sl=prices.slice(i-window,i+window+1);
      if(prices[i]===Math.max(...sl)&&prices[i]>cur)ph.push(prices[i]);
      if(prices[i]===Math.min(...sl)&&prices[i]<cur)pl.push(prices[i]);
    }
    const res=ph.sort((a,b)=>a-b).slice(0,4);
    const sup=pl.sort((a,b)=>b-a).slice(0,4);
    // Add 5/10/20% levels if missing
    [0.95,0.90,0.85].forEach(f=>{const v=cur*f;if(!sup.some(s=>Math.abs(s-v)/cur<0.02))sup.push(v)});
    [1.05,1.10,1.20].forEach(f=>{const v=cur*f;if(!res.some(r=>Math.abs(r-v)/cur<0.02))res.push(v)});
    return{supports:sup.sort((a,b)=>b-a).slice(0,3),resistances:res.sort((a,b)=>a-b).slice(0,3)};
  },
  marketStructure(prices){
    if(!prices||prices.length<30)return'neutral';
    const data=prices.slice(-Math.min(60,prices.length));
    const sw=6,sh=[],sl=[];
    for(let i=sw;i<data.length-sw;i++){
      const s=data.slice(i-sw,i+sw+1);
      if(data[i]===Math.max(...s))sh.push(data[i]);
      if(data[i]===Math.min(...s))sl.push(data[i]);
    }
    if(sh.length<2||sl.length<2)return'neutral';
    const hh=sh[sh.length-1]>sh[sh.length-2];
    const hl=sl[sl.length-1]>sl[sl.length-2];
    const lh=sh[sh.length-1]<sh[sh.length-2];
    const ll=sl[sl.length-1]<sl[sl.length-2];
    if(hh&&hl)return'bullish';
    if(lh&&ll)return'bearish';
    return'neutral';
  },
  // Écart-type des rendements journaliers (%) sur une fenêtre — utilisé comme
  // proxy de volatilité (rôle SOL : « recherche de rendement »). Aucune
  // dépendance externe : dérivé du même tableau de prix déjà récupéré.
  volatility(prices,window=14){
    if(!prices||prices.length<window+1)return null;
    const slice=prices.slice(-(window+1));
    const rets=[];
    for(let i=1;i<slice.length;i++)rets.push((slice[i]-slice[i-1])/slice[i-1]*100);
    const mean=rets.reduce((a,b)=>a+b,0)/rets.length;
    const variance=rets.reduce((a,b)=>a+(b-mean)*(b-mean),0)/rets.length;
    return Math.sqrt(variance);
  },
  // Tendance du volume (déjà inclus dans la réponse market_chart de CoinGecko,
  // simplement inutilisé jusqu'ici) : moyenne des 7 derniers jours vs les 7
  // précédents. Aucun appel API supplémentaire.
  volumeTrend(volumes){
    if(!volumes||volumes.length<14)return null;
    const v=volumes.map(x=>x[1]);
    const recent=v.slice(-7),prior=v.slice(-14,-7);
    const ra=recent.reduce((a,b)=>a+b,0)/recent.length;
    const pa=prior.reduce((a,b)=>a+b,0)/prior.length;
    if(!pa)return null;
    const changePct=(ra-pa)/pa*100;
    return{recentAvg:ra,priorAvg:pa,changePct,rising:changePct>8,falling:changePct<-8};
  }
};

// ═══════════════════════════════════════════════════
//  SIGNALS ENGINE
// ═══════════════════════════════════════════════════
const SIGNALS = {
  analyze(coinId,historicalPrices,currentPrice,marketItem,dominance,volumes){
    if(!historicalPrices||historicalPrices.length<30)return null;
    const p=historicalPrices;
    const rsi=MATH.rsi(p);
    const macd=MATH.macd(p);
    const ema20=MATH.ema(p,20);
    const ema50=MATH.ema(p,50);
    const ema100=MATH.ema(p,Math.min(100,p.length-1));
    const ema200=MATH.ema(p,Math.min(200,p.length-1));
    const pivots=MATH.pivots(p);
    const structure=MATH.marketStructure(p);
    const ath=marketItem?.ath||currentPrice*1.5;
    const regime=this.regime({rsi,macd,ema20,ema50,ema100,ema200,structure,price:currentPrice});
    const score=this.score({rsi,macd,ema20,ema50,ema100,ema200,structure,price:currentPrice,ath});
    const scenarios=this.scenarios({regime,rsi,macd,structure});
    const signal=this.signal(regime,rsi);
    const action=this.action(score,regime);
    const risk=this.risk(rsi,regime);
    const p7=p.slice(-7),p30=p.slice(-30),p90=p.slice(-90);
    const volatility14=MATH.volatility(p,14);
    const volTrend=MATH.volumeTrend(volumes);
    const accumulation=this.accumulation(p7,p30,volTrend);
    return{rsi,macd,ema20,ema50,ema100,ema200,supports:pivots.supports,resistances:pivots.resistances,structure,regime,score,scenarios,signal,action,risk,prices:{p7,p30,p90,full:p},dominance,ath,volatility14,volTrend,accumulation};
  },
  // Heuristique « accumulation » (rôle ETH) : signature classique = prix
  // plat/baissier alors que le volume monte (capital qui rentre sans pousser
  // le prix). Dérivé uniquement des données déjà récupérées (pas de MVRV réel
  // disponible sans source on-chain supplémentaire — voir règle d'honnêteté).
  accumulation(p7,p30,volTrend){
    if(!volTrend||!p30||p30.length<2)return{label:'indéterminée',cls:'neu'};
    const chgPct=(p30[p30.length-1]-p30[0])/p30[0]*100;
    if(chgPct<=3&&volTrend.rising)return{label:'probable (volume en hausse, prix stable/baissier)',cls:'pos'};
    if(chgPct>3&&volTrend.rising)return{label:'mouvement confirmé par le volume',cls:'pos'};
    if(chgPct>3&&volTrend.falling)return{label:'hausse peu confirmée (volume en baisse)',cls:'neu'};
    if(chgPct<=-3&&volTrend.falling)return{label:'baisse peu vendeuse (volume faible)',cls:'neu'};
    return{label:'sans signal net',cls:'neu'};
  },
  regime({rsi,macd,ema20,ema50,ema100,ema200,structure,price}){
    let bull=0,bear=0,reasons=[];
    if(ema20){price>ema20?bull++:bear++}
    if(ema50){price>ema50?bull++:bear++}
    if(ema100){price>ema100?bull++:bear++}
    if(ema200){price>ema200?bull++:bear++}
    if(macd){
      if(macd.bullish){bull++}else{bear++}
      if(macd.crossUp){bull+=2;reasons.push('Crossover MACD haussier')}
      if(macd.crossDown){bear+=2;reasons.push('Crossover MACD baissier')}
    }
    if(rsi!=null){rsi>50?bull++:bear++}
    if(structure==='bullish'){bull+=2;reasons.push('Structure de marché haussière (HH/HL)')}
    else if(structure==='bearish'){bear+=2;reasons.push('Structure de marché baissière (LH/LL)')}
    const margin=bull-bear,total=bull+bear;
    const conf=total>0?Math.round(Math.abs(margin)/total*100):50;
    let trend,emoji,label;
    if(margin>=4){trend='bullish';emoji='🟢';label='Trend haussier confirmé'}
    else if(margin<=-4){trend='bearish';emoji='🔴';label='Trend baissier confirmé'}
    else{trend='neutral';emoji='🟡';label='Marché en transition'}
    return{trend,emoji,label,bull,bear,conf,reasons};
  },
  score({rsi,macd,ema20,ema50,ema100,ema200,structure,price,ath}){
    let s=0;
    // RSI (0-30)
    if(rsi!=null){
      if(rsi<25)s+=30;else if(rsi<30)s+=26;else if(rsi<35)s+=21;else if(rsi<40)s+=16;
      else if(rsi<50)s+=11;else if(rsi<60)s+=8;else if(rsi<70)s+=5;else if(rsi<80)s+=2;
    }else s+=10;
    // MACD (0-20)
    if(macd){if(macd.crossUp)s+=20;else if(macd.bullish)s+=11;else s+=2}else s+=8;
    // EMA (0-25)
    if(ema20&&price>ema20)s+=5;if(ema50&&price>ema50)s+=7;if(ema100&&price>ema100)s+=7;if(ema200&&price>ema200)s+=6;
    // Structure (0-15)
    if(structure==='bullish')s+=15;else if(structure==='neutral')s+=7;else s+=1;
    // ATH distance (0-10)
    if(ath&&price){const d=(ath-price)/ath;if(d>0.6)s+=10;else if(d>0.45)s+=8;else if(d>0.3)s+=6;else if(d>0.15)s+=4;else s+=1}
    return Math.min(100,Math.max(0,Math.round(s)));
  },
  scenarios({regime,rsi,macd,structure}){
    let bear=30,neu=40,bull=30;
    if(regime.trend==='bearish'){bear+=12;bull-=12}
    else if(regime.trend==='bullish'){bear-=12;bull+=12}
    if(rsi!=null){if(rsi<30){bear-=8;bull+=8}else if(rsi>70){bear+=8;bull-=8}}
    if(macd){if(macd.crossUp){bear-=5;bull+=5}else if(macd.crossDown){bear+=5;bull-=5}}
    bear=Math.max(10,Math.min(70,Math.round(bear)));
    bull=Math.max(10,Math.min(70,Math.round(bull)));
    neu=100-bear-bull;if(neu<10)neu=10;
    const t=bear+neu+bull;
    return{bear:Math.round(bear/t*100),neu:Math.round(neu/t*100),bull:100-Math.round(bear/t*100)-Math.round(neu/t*100)};
  },
  signal(regime,rsi){
    if(regime.trend==='bullish'){if(rsi&&rsi>75)return{type:'neutral',emoji:'🟡',label:'Suracheté'};return{type:'bullish',emoji:'🟢',label:'Haussier'}}
    if(regime.trend==='bearish'){if(rsi&&rsi<28)return{type:'neutral',emoji:'🟡',label:'Survendu'};return{type:'bearish',emoji:'🔴',label:'Baissier'}}
    return{type:'neutral',emoji:'🟡',label:'Neutre'}
  },
  // Codes internes neutres (jamais affichés tels quels). La règle d'honnêteté
  // (voir TEXT.actionLabel) impose des libellés conditionnels à l'affichage —
  // on ne stocke donc plus d'impératif ("ACHETER") comme valeur de référence.
  action(score,regime){
    if(score>=72&&regime.trend!=='bearish')return'buy';
    if(score>=55)return'dca';
    if(score>=38)return'wait';
    return'avoid';
  },
  risk(rsi,regime){
    if(regime.trend==='bearish'||(rsi&&rsi>78))return'high';
    if(regime.trend==='bullish'&&rsi&&rsi<40)return'low';
    return'medium';
  }
};

const TEXT = {
  situation(sym,analysis,chg24){
